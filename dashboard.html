<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudioYou — Your Studio</title>
<link rel="icon" type="image/png" href="assets/SY_OFFICIAL_SHUTTER_KEY.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@1,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  /* ── PROCESS INDICATOR — center screen ── */
  #processOverlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9000;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    background: rgba(6,9,26,0.55);
    animation: procFadeIn 0.2s ease;
  }
  @keyframes procFadeIn { from { opacity:0; } to { opacity:1; } }
  #processOverlay.active { display: flex; }
  #processBox {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 32px 40px;
    background: var(--navy);
    border: 1px solid rgba(0,200,255,0.18);
    box-shadow: 0 0 40px rgba(0,200,255,0.08);
    min-width: 220px;
    animation: procSlideUp 0.25s ease;
  }
  @keyframes procSlideUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  #processSpinner {
    width: 44px; height: 44px;
    object-fit: contain;
  }
  #processStatus {
    font-family: 'Outfit', sans-serif;
    font-size: 11px; letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--cyan); opacity: 0.8;
    text-align: center;
    line-height: 1.6;
    white-space: nowrap;
  }

  /* Kill caret on display elements */
  .studio-name, .lot-title, .lot-sub, .lot-stat-v, .lot-stat-l,
  .b-name, .b-desc, .nav-item, .fy-panel-name, .fy-p-t,
  .mod-h, .mod-sub {
    user-select: none;
    caret-color: transparent;
    cursor: default;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black:   #06091a;
    --navy:    #0b0d1a;
    --navy-2:  #0f1228;
    --navy-3:  #141830;
    --white:   #f0f2ff;
    --dim:     rgba(240,242,255,0.65);
    --mute:    rgba(240,242,255,0.32);
    --ghost:   rgba(240,242,255,0.05);
    --cyan:    #00c8ff;
    --purple:  #7b35d4;
    --grad:    linear-gradient(135deg, #00c8ff 0%, #5e28a8 60%, #7b35d4 100%);
    --gradT:   linear-gradient(135deg, #00c8ff 0%, #a06be8 100%);
    --border:  rgba(0,200,255,0.08);
    --border-h:rgba(0,200,255,0.22);
    --sidebar: 280px;
  }
  html, body, #root { height: 100%; overflow: hidden; }
  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Outfit', sans-serif;
    font-weight: 300;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
    background-size: 256px; pointer-events: none; z-index: 9999;
  }

  .layout {
    display: grid;
    grid-template-rows: 56px auto 1fr;
    grid-template-columns: var(--sidebar) 1fr;
    height: 100vh;
  }

  /* TOPBAR */
  .topbar {
    grid-column: 1 / -1;
    background: var(--navy);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0; position: relative; z-index: 100;
  }
  .topbar-logo {
    width: var(--sidebar); flex-shrink: 0;
    display: flex; align-items: center;
    padding: 0 20px;
    border-right: 1px solid var(--border);
    height: 100%;
  }
  .topbar-logo { cursor: pointer; position: relative; }
  .topbar-logo img { height: 37px; width: auto; transition: filter 0.15s ease, transform 0.15s ease; }
  .topbar-logo:hover img { filter: brightness(1.25); transform: scale(1.08); }
  .topbar-logo:active img { transform: scale(0.94); }

  /* Studio menu */
  .studio-menu {
    position: absolute; top: calc(100% + 4px); left: 0;
    width: 220px;
    background: var(--navy);
    border: 1px solid rgba(0,200,255,0.18);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    z-index: 500;
    animation: menuIn 0.15s ease;
  }
  @keyframes menuIn {
    from { opacity:0; transform:translateY(-6px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .studio-menu::before {
    content:''; position:absolute; top:0; left:0; right:0; height:1px;
    background: linear-gradient(135deg,#00c8ff,#7b35d4);
  }
  .studio-menu-section {
    font-size:8px; letter-spacing:0.28em; text-transform:uppercase;
    color:rgba(240,242,255,0.25); padding:12px 16px 6px;
  }
  .studio-menu-item {
    display:flex; align-items:center; gap:10px;
    padding:10px 16px; cursor:pointer;
    font-size:12px; letter-spacing:0.06em; color:rgba(240,242,255,0.7);
    transition:background 0.15s, color 0.15s;
    border:none; background:none; width:100%; text-align:left;
  }
  .studio-menu-item:hover { background:rgba(0,200,255,0.06); color:var(--white); }
  .studio-menu-item.danger { color:rgba(255,100,100,0.6); }
  .studio-menu-item.danger:hover { background:rgba(255,100,100,0.06); color:rgba(255,100,100,0.9); }
  .studio-menu-divider { height:1px; background:rgba(240,242,255,0.06); margin:4px 0; }
  .topbar-center {
    flex: 1; padding: 0 24px;
    display: flex; align-items: center; gap: 14px;
  }
  .studio-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; letter-spacing: 0.08em;
    background: var(--gradT);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .studio-badge {
    font-size: 8px; letter-spacing: 0.16em;
    text-transform: uppercase; padding: 2px 10px;
    border: 1px solid rgba(0,200,255,0.3);
    color: var(--cyan); background: rgba(0,200,255,0.05);
  }
  .studio-badge.badge-established {
    border-color: rgba(232,201,122,0.4);
    color: #e8c97a; background: rgba(232,201,122,0.06);
  }
  .topbar-right {
    display: flex; align-items: center;
    gap: 12px; padding-right: 20px;
  }
  .fy-pill {
    display: flex; align-items: center; gap: 8px;
    font-size: 10px; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--mute);
    cursor: pointer; padding: 6px 14px;
    border: 1px solid var(--border);
    transition: all 0.2s ease;
  }
  .fy-pill:hover { border-color: var(--border-h); color: var(--cyan); }
  .fy-status-box {
    display: flex; align-items: center; gap: 8px;
    font-size: 10px; letter-spacing: 0.16em;
    text-transform: uppercase; color: #4cff91;
    padding: 6px 14px; border: 1px solid rgba(76,255,145,0.2);
    animation: fyGreenPulse 2.5s ease-in-out infinite;
  }
  .fy-status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #4cff91; flex-shrink: 0;
    animation: fyGreenPulse 2.5s ease-in-out infinite;
  }
  .fy-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--cyan);
    animation: fyp 2.5s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes fyp {
    0%,100% { opacity:0.4; transform:scale(1); }
    50%      { opacity:1;   transform:scale(1.4); }
  }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--grad);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px; color: var(--black);
    cursor: pointer; flex-shrink: 0;
    position: relative; overflow: hidden;
    box-shadow: 0 0 0 2px rgba(0,200,255,0.2), 0 0 14px rgba(0,200,255,0.25);
    animation: avatarGlow 3s ease-in-out infinite;
  }
  .avatar::after {
    content: '';
    position: absolute;
    top: -50%; left: -75%;
    width: 45%; height: 200%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.45), transparent);
    transform: skewX(-18deg);
    animation: avatarGlint 6.75s ease-in-out infinite;
    pointer-events: none;
  }
  .avatar:hover { filter: brightness(1.25); transform: scale(1.08); transition: filter 0.15s ease, transform 0.15s ease; }
  .avatar:active { transform: scale(0.94); }
  @keyframes avatarGlow {
    0%,100% { box-shadow: 0 0 0 2px rgba(0,200,255,0.2), 0 0 14px rgba(0,200,255,0.2); }
    50%      { box-shadow: 0 0 0 2px rgba(0,200,255,0.45), 0 0 22px rgba(0,200,255,0.5), 0 0 42px rgba(0,200,255,0.15); }
  }
  @keyframes avatarGlint {
    0%, 65%  { left: -75%; }
    80%      { left: 125%; }
    100%     { left: 125%; }
  }

  /* SIDEBAR */
  .sidebar {
    background: var(--navy);
    border-right: 1px solid var(--border);
    overflow-y: auto;
  }

  /* FY PANEL */
  .fy-panel { padding: 18px 20px; border-bottom: 1px solid var(--border); }
  .fy-panel-hd {
    display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
  }
  .fy-icon {
    width: 26px; height: 26px; flex-shrink: 0;
  }
  .fy-panel-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px; letter-spacing: 0.06em; color: #4cff91;
    animation: fyGreenPulse 2.5s ease-in-out infinite;
  }
  @keyframes fyGreenPulse {
    0%,100% { opacity:0.7; }
    50%      { opacity:1; }
  }
  .fy-panel-sub {
    font-size: 8px; letter-spacing: 0.2em;
    text-transform: uppercase; color: #e8c97a;
  }

  .fy-loading {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; color: var(--mute);
    padding: 8px 0;
  }
  .fy-spinner {
    width: 28px; height: 28px; flex-shrink: 0;
    background: url('assets/shutter1.gif') center/contain no-repeat;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .fy-priorities { display: flex; flex-direction: column; gap: 8px; }
  .fy-p {
    display: flex; gap: 10px; padding: 10px 12px;
    background: var(--ghost); border: 1px solid var(--border);
    cursor: pointer; transition: all 0.2s ease;
    position: relative; overflow: hidden;
  }
  .fy-p::before {
    content: ''; position: absolute;
    top: 0; left: 0; width: 2px; height: 100%;
    background: var(--grad); transform: scaleY(0);
    transform-origin: top; transition: transform 0.3s ease;
  }
  .fy-p:hover { border-color: var(--border-h); background: rgba(0,200,255,0.04); }
  .fy-p:hover::before { transform: scaleY(1); }
  .fy-p-tap { cursor: pointer; }
  .fy-p-tap:active { opacity: 0.7; }
  .fy-p-n {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; line-height: 1;
    color: rgba(0,200,255,0.18); flex-shrink: 0; width: 18px;
  }
  .fy-p-t { font-size: 11px; line-height: 1.55; color: var(--dim); }

  .fy-talk {
    margin-top: 12px; width: 100%;
    background: transparent; border: 1px solid var(--border);
    color: #4cff91;
    font-family: 'Outfit', sans-serif;
    font-size: 9px; letter-spacing: 0.18em;
    text-transform: uppercase; padding: 9px;
    cursor: pointer; transition: all 0.2s ease;
    display: flex; align-items: center;
    justify-content: center; gap: 7px;
  }
  .fy-talk:hover { border-color: #4cff91; color: #4cff91; }

  /* JOURNEY */
  .journey { padding: 14px 20px; border-bottom: 1px solid var(--border); }
  .j-label {
    font-size: 8px; letter-spacing: 0.28em;
    text-transform: uppercase; color: var(--cyan);
    opacity: 0.6; margin-bottom: 8px;
  }
  .j-track {
    height: 2px; background: rgba(0,200,255,0.08);
    margin-bottom: 6px;
  }
  .j-fill {
    height: 100%; background: var(--grad);
    animation: journeyBuild var(--j-duration, 8s) ease-in-out infinite;
  }
  @keyframes journeyBuild {
    0%   { width: 0%; opacity: 0.4; }
    40%  { width: var(--j-pct, 50%); opacity: 1; }
    55%  { width: var(--j-pct, 50%); opacity: 1; }
    95%  { width: 0%; opacity: 0.4; }
    100% { width: 0%; opacity: 0.4; }
  }
  .j-meta {
    display: flex; justify-content: space-between;
    font-size: 10px; color: var(--mute);
  }
  .j-next {
    margin-top: 12px;
    padding: 13px 14px;
    background: rgba(240,242,255,0.02);
    border-left: 2px solid rgba(240,242,255,0.1);
    cursor: pointer;
    transition: background 0.2s ease, border-color 0.2s ease;
  }
  .j-next.j-next-loading { cursor: default; }
  .j-next:not(.j-next-loading):hover { background: rgba(240,242,255,0.04); border-left-color: rgba(240,242,255,0.2); }
  .j-next-signal {
    font-size: 8px; letter-spacing: 0.22em; text-transform: uppercase;
    color: rgba(240,242,255,0.28); margin-bottom: 8px;
  }
  .j-next-obs {
    font-size: 11px; color: rgba(240,242,255,0.45); line-height: 1.6;
    margin-bottom: 10px; font-style: italic;
  }
  .j-next-cta {
    font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase;
    color: rgba(240,242,255,0.3); display: flex; align-items: center; gap: 5px;
  }
  .j-next-cta::after { content: '→'; }

  /* Established milestone — gold, the only gold box in the sidebar */
  .j-next.j-next-gold {
    background: rgba(232,201,122,0.04);
    border-left-color: rgba(232,201,122,0.45);
  }
  .j-next.j-next-gold:hover { background: rgba(232,201,122,0.08); border-left-color: rgba(232,201,122,0.7); }
  .j-next.j-next-gold .j-next-signal { color: rgba(232,201,122,0.5); }
  .j-next.j-next-gold .j-next-obs    { color: rgba(232,201,122,0.78); }
  .j-next.j-next-gold .j-next-cta    { color: rgba(232,201,122,0.55); }
  .fy-info-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 13px; height: 13px; border-radius: 50%;
    border: 1px solid rgba(240,242,255,0.25);
    font-size: 8px; color: rgba(240,242,255,0.45);
    cursor: pointer; flex-shrink: 0; line-height: 1;
    transition: border-color 0.2s, color 0.2s;
  }
  .fy-info-btn:hover { border-color: rgba(240,242,255,0.6); color: rgba(240,242,255,0.8); }
  .fy-info-box {
    position: relative;
    margin-top: 6px; padding: 8px 24px 8px 10px;
    font-size: 10px; line-height: 1.6;
    color: rgba(240,242,255,0.6);
    background: rgba(240,242,255,0.04);
    border-left: 2px solid rgba(0,200,255,0.3);
  }
  .fy-info-close {
    position: absolute; top: 6px; right: 8px;
    font-size: 12px; color: rgba(240,242,255,0.3);
    cursor: pointer; line-height: 1;
  }
  .fy-info-close:hover { color: rgba(240,242,255,0.7); }

  /* NAV / RECOMMENDED NEXT */
  .sidebar-nav { padding: 10px 0; }
  .nav-group { padding: 12px 20px 4px;
    font-size: 8px; letter-spacing: 0.28em;
    text-transform: uppercase; color: var(--mute);
  }
  .rec-loading {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 20px; font-size: 11px; color: var(--mute);
  }
  .rec-card {
    margin: 8px 12px 12px;
    padding: 16px;
    background: rgba(0,200,255,0.03);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .rec-card:hover {
    background: rgba(0,200,255,0.07);
    border-color: var(--border-h);
  }
  .rec-icon { font-size: 22px; margin-bottom: 10px; line-height: 1; }
  .rec-name { font-size: 15px; font-weight: 600; color: var(--white); margin-bottom: 7px; }
  .rec-desc { font-size: 11px; color: var(--dim); line-height: 1.55; margin-bottom: 12px; }
  .rec-tools { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 14px; }
  .rec-tool {
    font-size: 9px; letter-spacing: 0.05em;
    padding: 3px 8px;
    background: var(--ghost);
    border: 1px solid var(--border);
    color: var(--mute);
  }
  .rec-cta {
    font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--cyan); display: flex; align-items: center; gap: 5px;
  }
  .rec-cta::after { content: '→'; }

  /* MAIN */
  .main {
    overflow-y: auto; background: var(--black);
    position: relative;
  }
  .ambient {
    position: fixed; border-radius: 50%;
    pointer-events: none; z-index: 0;
  }
  .amb-1 { top: -15vh; right: -10vw; width: 50vw; height: 50vh;
    background: radial-gradient(ellipse, rgba(0,200,255,0.04) 0%, transparent 70%); }
  .amb-2 { bottom: 5vh; left: 5vw; width: 40vw; height: 40vh;
    background: radial-gradient(ellipse, rgba(123,53,212,0.05) 0%, transparent 70%); }

  /* LOT HEADER */
  .lot-hd {
    padding: 28px 32px 22px;
    border-bottom: 1px solid var(--border);
    position: relative; z-index: 2;
  }
  .lot-ey {
    font-size: 9px; letter-spacing: 0.28em;
    text-transform: uppercase; color: var(--cyan);
    opacity: 0.6; margin-bottom: 6px;
  }
  .lot-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; letter-spacing: 0.04em;
    color: var(--white);
  }
  .lot-sub { font-size: 11px; color: var(--mute); margin-top: 3px; }
  .lot-stats {
    display: flex; gap: 24px; margin-top: 16px; flex-wrap: wrap;
  }
  .lot-stat { display: flex; flex-direction: column; gap: 1px; }
  .lot-stat-v {
    font-family: 'Bebas Neue', sans-serif; font-size: 22px;
    background: var(--gradT);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; line-height: 1;
  }
  .lot-stat-l {
    font-size: 8px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--mute);
  }

  /* FY FIRST ACTION — Independent tier directive */
  .fy-first-action {
    margin: 24px 32px 0;
    background: var(--navy-2);
    border: 1px solid rgba(0,200,255,0.18);
    position: relative; overflow: hidden;
    animation: arrivalIn 0.8s ease;
    z-index: 2;
  }
  .fy-first-action::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: var(--grad);
  }
  .fy-first-action-inner {
    padding: 22px 26px;
  }
  .fy-fa-eyebrow {
    font-size: 8px; letter-spacing: 0.28em;
    text-transform: uppercase; color: var(--cyan);
    opacity: 0.7; margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .fy-fa-message {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 15px; line-height: 1.7;
    color: var(--dim); margin-bottom: 20px;
  }
  .fy-fa-cta-row {
    display: flex; align-items: center; gap: 14px;
  }
  .fy-fa-btn {
    background: var(--grad); border: none;
    color: var(--black);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px; letter-spacing: 0.14em;
    padding: 11px 26px; cursor: pointer;
    transition: opacity 0.2s ease;
    flex-shrink: 0;
  }
  .fy-fa-btn:hover { opacity: 0.85; }
  .fy-fa-skip {
    font-size: 9px; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--mute);
    cursor: pointer; background: none; border: none;
    font-family: 'Outfit', sans-serif; padding: 0;
    transition: color 0.2s ease;
  }
  .fy-fa-skip:hover { color: var(--white); }
  .fy-fa-loading {
    display: flex; align-items: center; gap: 10px;
    padding: 22px 26px;
    font-size: 11px; color: var(--mute);
  }

  /* FY ARRIVAL BANNER — shown once on first visit */
  .fy-arrival {
    margin: 24px 32px 0;
    padding: 20px 24px;
    background: var(--navy-2);
    border: 1px solid rgba(0,200,255,0.15);
    position: relative; overflow: hidden;
    animation: arrivalIn 0.8s ease;
    z-index: 2;
  }
  @keyframes arrivalIn {
    from { opacity:0; transform:translateY(-8px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .fy-arrival::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: var(--grad);
  }
  .fy-arrival-label {

<div id="processOverlay">
  <div id="processBox">
    <img id="processSpinner" src="assets/shutter1.gif" alt=""/>

  </div>

<script>
var _twHandle = null;
var _twIsInterval = false;

function _twClear() {
  if (_twHandle !== null) {
    if (_twIsInterval) clearInterval(_twHandle);
    else clearTimeout(_twHandle);
    _twHandle = null;
  }
}

function startProcessing(msg) {
  _twClear();
  var el     = document.getElementById('processOverlay');
  var status = document.getElementById('processStatus');
  el.classList.add('active');
  status.textContent = '';
  if (!msg) return;

  var i = 0;
  function tick() {
    if (i < msg.length) {
      status.textContent += msg[i++];
      _twIsInterval = false;
      _twHandle = setTimeout(tick, 38);
    } else {
      i = 0;
      status.textContent = '';
      _twIsInterval = false;
      _twHandle = setTimeout(function() {
        _twHandle = null;
        tick();
      }, 3000);
    }
  }
  tick();
}

function stopProcessing() {
  _twClear();
  document.getElementById('processOverlay').classList.remove('active');
  document.getElementById('processStatus').textContent = '';
}
</script>

// ── FY PRIORITIES GENERATOR ──────────────────────────────────────────────────

async function generateFYPriorities(formation, sessionToken) {
  const prompt = `You are FutureYou — the career arc navigator at the core of StudioYou. You are not an AI assistant. You know this creator's journey specifically. Based on their formation data, generate exactly 3 specific, actionable first priorities. Each priority is 1 direct sentence — no fluff, no generic advice.

Creator data:
- Makes: ${(formation.contentTypes||[]).join(', ')}
- Platforms: ${(formation.platforms||[]).join(', ')}
- Experience: ${formation.experience}
- Stage: ${formation.incomeStage}
- 1-year goal: ${formation.goal1yr}
- Biggest fear: ${formation.biggestFear}
- Origin: ${formation.origin}

Return ONLY a JSON array of 3 objects with "text" and "target" keys. No other text.
"text": the priority sentence.
"target": where tapping it should send the creator. Must be one of: "ideation", "brand-builder", "distribute", "fund", "market", "monetize", "post", "clear", "develop", "cast", "plan", "produce", "fy".
Use the specific module name when the priority maps directly to a production stage. Use "fy" for priorities that need a conversation to unpack.

Example format:
[{"text":"Define your content format and audience before building anything else.","target":"ideation"},{"text":"Lock in your brand identity so every platform tells the same story.","target":"brand-builder"},{"text":"Map your monetization path — you have the audience, not the infrastructure.","target":"monetize"}]`;

  try {
    const res = await fetch(`${API_URL}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${sessionToken}` },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 400,
        messages: [{ role:'user', content: prompt }]
      })
    });
    const data = await res.json();
    const text = data.content?.[0]?.text || '[]';
    const clean = text.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);
    // Normalise — handle both old string format and new object format
    return parsed.map(p => typeof p === 'string' ? { text: p, target: 'fy' } : p);
  } catch {
    return [
      { text: 'Document your existing content across all platforms to build your IP inventory.', target: 'fy' },
      { text: `Lock in a consistent brand identity across ${(formation.platforms||['your platforms']).slice(0,2).join(' and ')}.`, target: 'brand-builder' },
      { text: formation.goal1yr
          ? `Your one-year goal requires a concrete plan — start by mapping the three steps between now and that outcome.`
          : 'Connect your distribution channels to track your audience data in one place.',
        target: 'distribute' },
    ];
  }
}

function FYFirstAction({ formation, onDismiss, onOpenModule }) {
  const [message, setMessage] = useState(null);
  const [action, setAction] = useState(null); // { label, target }

  useEffect(() => {
    const tok = (() => { try { return localStorage.getItem('sy_session') || ''; } catch { return ''; } })();
    generateFirstAction(formation, tok).then(result => {
      setMessage(result.message);
      setAction(result.action);
    });
  }, []);

  async function generateFirstAction(formation, sessionToken) {
    const prompt = `You are Future You inside StudioYou. This creator just arrived at their dashboard for the first time. Based on their formation data, write ONE specific, direct sentence telling them exactly what to do first — not a platitude, a real first action. Then return the label for a CTA button (3-5 words max).

Formation:
- Makes: ${(formation.contentTypes||[]).join(', ')}
- Platforms: ${(formation.platforms||[]).join(', ')}
- Experience: ${formation.experience}
- Stage: ${formation.incomeStage}
- 1-year goal: ${formation.goal1yr || 'not provided'}
- Biggest fear: ${formation.biggestFear || 'not provided'}
- Studio name: ${formation.studioName || 'not named yet'}

Return ONLY a JSON object like:
{"message": "One sentence here telling them exactly what to do first.", "cta": "CTA label here"}`;

    try {
      const res = await fetch(`${API_URL}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${sessionToken}` },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 200,
          messages: [{ role: 'user', content: prompt }]
        })
      });
      const data = await res.json();
      const text = data.content?.[0]?.text || '{}';
      const clean = text.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);
      // Determine which module to target based on formation
      const target = !formation.studioName ? 'brand-builder'
        : (formation.platforms||[]).some(p=>['YouTube','TikTok','Instagram'].includes(p)) ? 'distribute'
        : 'ideation';
      return { message: parsed.message, action: { label: parsed.cta, target } };
    } catch {
      return {
        message: !formation.studioName
          ? 'Name your studio first — everything else builds from that identity.'
          : `Start with Brand Builder to lock in your identity across ${(formation.platforms||['your platforms']).slice(0,2).join(' and ')}.`,
        action: {
          label: !formation.studioName ? 'Name Your Studio' : 'Open Brand Builder',
          target: 'brand-builder'
        }
      };
    }
  }

  function handleCTA() {
    if (action?.target) onOpenModule(action.target);
    onDismiss();
  }

  return (
    <div className="fy-first-action">
      {!message ? (
        <div className="fy-fa-loading">
          <div className="fy-spinner"/>
          Future You is reading your formation...
        </div>
      ) : (
        <div className="fy-first-action-inner">
          <div className="fy-fa-eyebrow">
            <div className="fy-dot"/>
            Future You — First Move
          </div>
          <div className="fy-fa-message">{message}</div>
          <div className="fy-fa-cta-row">
            <button className="fy-fa-btn" onClick={handleCTA}>
              {action?.label || 'Get Started'}
            </button>
            <button className="fy-fa-skip" onClick={onDismiss}>
              I'll explore on my own
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function FYChat({ formation, initialPrompt, onClose }) {

// ── AUTH INITIALIZER ──────────────────────────────────────────────────────────

function AppShell() {
  const [authState, setAuthState] = React.useState('checking'); // checking | authenticated | unauthenticated
  const [formation, setFormation] = React.useState(null);
  const [isReturning, setIsReturning] = React.useState(false);
  const [needsLink, setNeedsLink] = React.useState(false); // true when session missing but localStorage present

  React.useEffect(() => {
    async function init() {
      // 1. Check for magic link token in URL (coming from email click)
      const params = new URLSearchParams(window.location.search);
      const urlToken = params.get('token');

      if (urlToken) {
        try {
          const res = await fetch(`${API_URL}/api/auth/verify?token=${urlToken}`);
          const data = await res.json();
          if (data.success) {
            // Store session token
            localStorage.setItem('sy_session', data.sessionToken);
            localStorage.setItem('sy_email', data.email);
            if (data.formation && Object.keys(data.formation).length > 0) {
              localStorage.setItem('sy_formation', JSON.stringify(data.formation));
              setFormation(data.formation);
            }
            // Clean URL
            window.history.replaceState({}, '', window.location.pathname);
            setAuthState('authenticated');
            return;
          }
        } catch(e) {
          console.warn('Token verification failed:', e);
        }
      }

      // 2. Check for existing session token
      const sessionToken = localStorage.getItem('sy_session');
      if (sessionToken) {
        try {
          const res = await fetch(`${API_URL}/api/me`, {
            headers: { 'Authorization': `Bearer ${sessionToken}` },
          });
          const data = await res.json();
          if (data.authenticated && data.formation) {
            localStorage.setItem('sy_formation', JSON.stringify(data.formation));
            setFormation(data.formation);
            setIsReturning(true);
            setAuthState('authenticated');
            return;
          }
        } catch(e) {
          console.warn('Session check failed, falling back to localStorage:', e);
        }
      }

      // 3. Fall back to localStorage formation (no backend session)
      const localFormation = localStorage.getItem('sy_formation');
      if (localFormation) {
        try {
          setFormation(JSON.parse(localFormation));
          setNeedsLink(true); // prompt user to get their sign-in link
          setAuthState('authenticated');
          return;
        } catch(e) {}
      }

      // 4. No session, no localStorage — show return screen
      setAuthState('unauthenticated');
    }

    init();
  }, []);

  if (authState === 'checking') {
    return (
      <div style={{
        height:'100vh', display:'flex', alignItems:'center',
        justifyContent:'center', background:'var(--black)',
      }}>
        <div style={{
          width:'24px', height:'24px', borderRadius:'50%',
          border:'1px solid rgba(0,200,255,0.2)',
          borderTopColor:'var(--cyan)',
          animation:'spin 0.8s linear infinite',
        }}/>
        <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
      </div>
    );
  }

  if (authState === 'unauthenticated') {
    return <ReturnScreen/>;
  }

  return <Dashboard formationOverride={formation} isReturning={isReturning} needsLink={needsLink}/>;
}

  const openCount   = ALL_BUILDINGS.filter(b=>unlocked.includes(b.id)).length;

  // Generate FY priorities from real formation data
  useEffect(()=>{
    const msgs = [
      'Selecting your services...',
      'Adding tools to your lot...',
      'Getting everything you need...',
      'Preparing your studio...',
    ];
    let mIdx = 0;
    startProcessing(msgs[mIdx]);
    const rotate = setInterval(()=>{
      mIdx = (mIdx + 1) % msgs.length;
      startProcessing(msgs[mIdx]);
    }, 4000);
    const tok = (() => { try { return localStorage.getItem('sy_session') || ''; } catch { return ''; } })();
    generateFYPriorities(formation, tok).then(p => {
      clearInterval(rotate);
      setPriorities(p);
      stopProcessing();
    });
    return () => clearInterval(rotate);
  },[]);

  // Typewriter for FY first words arrival banner
  useEffect(() => {
    if (!showArrival || !formation.fyFirstWords) return;
    const text = formation.fyFirstWords;
    let i = 0;
    setArrivedText('');
    setArrivedDone(false);
    // Small delay so the banner animation completes first
    const start = setTimeout(() => {
      const iv = setInterval(() => {
        if (i < text.length) {
          i++;
          setArrivedText(text.slice(0, i));
        } else {
          clearInterval(iv);
          setArrivedDone(true);
        }
      }, 24);
    }, 600);
    return () => clearTimeout(start);
  }, [showArrival]);

  // Experience to journey label
  const journeyStage = formation.experience === 'Just starting' ? 'Formation'
    : ['1–2 years','3–5 years'].includes(formation.experience) ? 'Development'
    : 'Established';

  // Formation signal — FY's personal observation about this creator's arc.
  // Grounded in Education Module tier triggers from StudioYou_FutureYou_Narrative.md:
  //   Tier 1: work outpacing technical knowledge → skill gap signal
  //   Tier 2: output quality ready for institutional doors → legitimacy signal
  //   Tier 3: ready for rooms output alone can't open → network signal
  // This block is FY speaking about the creator's becoming — not a building nav prompt.
  const stageMilestone = journeyStage === 'Formation'
    ? { signal: 'Formation in progress',
        obs: "The more you share with me, the more precisely I can guide each stage of your arc. Your formation is still early — I'm building the model.",
        cta: 'Go deeper with FutureYou',
        fyPrompt: "I want to go deeper on my formation with you. Ask me anything that helps you understand where I'm headed — my goals, my fears, what I'm actually trying to build." }
    : journeyStage === 'Development'
    ? { signal: 'Tier 1 signal — skill gap watch',
        obs: "You're building. I'm watching for the moment your work outpaces what you currently know how to do. That gap is the next thing we address.",
        cta: 'Talk to FutureYou about what\'s gating you',
        fyPrompt: "Let's talk about what's actually gating my next step. I want to figure out whether it's a skill I'm missing, a credential that would open doors, or a room I should be in that I'm not." }
    : { signal: 'Tier 2–3 signal — room readiness',
        obs: "You've built the foundation. I'm watching for the rooms you're ready for — the ones your output alone can't open. That's what we focus on next.",
        cta: 'Talk to FutureYou about the next room',
        fyPrompt: "Walk me through what I've built so far. I want you to identify the next room I'm ready for — an institution, a community, a network — and tell me what I'd bring to it and why this is the moment." };

  const nextMilestone = !formation.studioName
    ? { signal: 'Formation not yet started',
        obs: "I don't have enough yet to build your arc. Start your formation — name your studio, tell me what you're making, and let me begin.",
        cta: 'Begin your formation',
        fyPrompt: "I'm just starting out and I want to begin my formation with you. Help me define who I am as a creator — what I'm making, who it's for, and where I'm trying to go." }
    : !priorities
    ? { signal: 'Reading your formation...',
        obs: "I'm reviewing what you've shared. Give me a moment — I'll surface what I see.",
        cta: null,
        fyPrompt: null }
    : stageMilestone;

  function openFY(prompt) {
    setShowWelcome(false);
    setFyInitialPrompt(prompt || null);
    setShowFY(true);
  }

  // Stage-specific FY prompts — used when a building has no dedicated module.
  // CAST and DISTRIBUTE are FY-advisory stages per routing logic doc.
  const stageFYPrompts = {
    develop:    "I'm working on developing a project — scripting, storyboarding, or pitch prep. Where should I start given where I am?",
    fund:       "I need to think about funding my next project. Help me understand my options given my stage and what I'm making.",
    cast:       "I'm in the casting phase. Help me think through my approach to finding the right talent for this project.",
    plan:       "I'm in pre-production. Help me think through scheduling, crew, and logistics for what I'm making.",
    produce:    "I'm heading into production. What should I have locked down before we shoot?",
    post:       "I'm in post-production. Help me think through my edit, audio, and finishing workflow.",
    clear:      "I need to clear rights on my content. Walk me through what I need to address for this project.",
    distribute: "I'm ready to distribute. Help me think through my platform strategy and release timing.",
    market:     "I need to build a campaign around my release. Where do I start given my audience and platforms?",
    monetize:   "Help me think through my monetization — brand deals, sponsorships, and revenue streams I should be building.",
  };

  const [flashingBuilding, setFlashingBuilding] = React.useState(null);

  function handleBuildingClick(b) {
    setShowWelcome(false);
    setFlashingBuilding(b.id);
    setTimeout(() => {
      setFlashingBuilding(null);
      if (b.module === 'brand-builder') setActiveModule('brand-builder');
      else if (b.module === 'ideation') setActiveModule('ideation');
      else if (b.id === 'distribute') setActiveModule('distribute');
      else openFY(stageFYPrompts[b.id] || null);
    }, 320);
  }

  function handleOpenModule(target) {
    setShowWelcome(false);
    if (target === 'brand-builder') setActiveModule('brand-builder');
    else if (target === 'ideation') setActiveModule('ideation');
    else if (target === 'distribute') setActiveModule('distribute');
  }

  return (
    <>
      <div className="ambient amb-1"/>
      <div className="ambient amb-2"/>

      <div className="layout">
        {/* TOPBAR */}
        <div className="topbar">
          <div className="topbar-logo" onClick={e=>{ e.stopPropagation(); setShowStudioMenu(m=>!m); }}>
            <img src="assets/SY_LOGO_2D_OFFICIAL.png" alt="StudioYou"/>
            {showStudioMenu && (
              <div className="studio-menu" onClick={e=>e.stopPropagation()}>
                <div className="studio-menu-section">Studio</div>
                <button className="studio-menu-item" onClick={()=>{ setShowStudioMenu(false); setActiveModule(null); setShowFY(false); }}>
                  ⬜ The Lot
                </button>
                <button className="studio-menu-item" onClick={()=>{ setShowStudioMenu(false); openFY(null); }}>
                  ⚡ Talk to FutureYou
                </button>
                <button className="studio-menu-item" onClick={()=>{ setShowStudioMenu(false); setActiveModule('brand-builder'); }}>
                  🎨 Brand Builder
                </button>
                <button className="studio-menu-item" onClick={()=>{ setShowStudioMenu(false); setActiveModule('ideation'); }}>
                  💡 Brief Generator
                </button>
                <div className="studio-menu-divider"/>
                <div className="studio-menu-section">Account</div>
                <button className="studio-menu-item" onClick={()=>{ setShowStudioMenu(false); window.location.href='index.html'; }}>
                  🏠 StudioYou Home
                </button>
                <button className="studio-menu-item danger" onClick={()=>{
                  setShowStudioMenu(false);
                  try { localStorage.removeItem('sy_session'); localStorage.removeItem('sy_email'); } catch(e){}
                  window.location.href='index.html#lp-signin';
                }}>
                  ↩ Switch User / Sign Out
                </button>
              </div>
            )}
          </div>
          <div className="topbar-center">
            <span className="studio-name">{studioName}</span>
            <span className={`studio-badge${journeyStage==='Established'?' badge-established':''}`}>{journeyStage}</span>
          </div>
          <div className="topbar-right">
            <div className="fy-status-box">
              <div className="fy-status-dot"/>
              FutureYou is here
            </div>
            <div className="avatar" onClick={()=>setShowFY(true)}>FY</div>
          </div>
        </div>

        {/* NEEDS LINK BANNER */}
        {needsLink && <NeedsLinkBanner/>}

        {/* SIDEBAR */}
        <div className="sidebar">
          {/* FY Panel */}
          <div className="fy-panel">
            <div className="fy-panel-hd">
              <img src="assets/shutter1.gif" alt="" style={{width:22,height:22,objectFit:'contain',flexShrink:0,mixBlendMode:'lighten'}}/>
              <div>
                <div className="fy-panel-name">FutureYou</div>
                <div className="fy-panel-sub">
                  {priorities ? '3 first actions ready' : 'Preparing your studio...'}
                </div>
              </div>
            </div>

            {!priorities ? (
              <div className="fy-loading">
                <div className="fy-spinner"/>
                Reading your formation...
              </div>
            ) : (
              <div className="fy-priorities">
                {priorities.map((p,i)=>{
                  const text = typeof p === 'string' ? p : p.text;
                  const target = typeof p === 'string' ? 'fy' : (p.target || 'fy');
                  function handlePriority() {
                    if (target === 'brand-builder' || target === 'ideation' || target === 'distribute') {
                      setActiveModule(target);
                    } else if (['ideate','develop','fund','cast','plan','produce','post','clear','market','monetize'].includes(target)) {
                      openFY(stageFYPrompts[target] || text);
                    } else {
                      openFY(text);
                    }
                  }
                  return (
                    <div key={i} className="fy-p fy-p-tap" onClick={handlePriority}>
                      <div className="fy-p-n">{i+1}</div>
                      <div className="fy-p-t">{text}</div>
                    </div>
                  );
                })}
              </div>
            )}
            <button className="fy-talk" onClick={()=>setShowFY(true)}>
              <div className="fy-dot" style={{width:5,height:5}}/>
              Talk to FutureYou
            </button>
          </div>

          {/* Journey Engine */}
          <div className="journey">
            <div className="j-label">Journey Engine</div>
            <div className="j-track">
              <div className="j-fill" style={{'--j-pct':`${journeyPct}%`,'--j-duration':'8s'}}/>
            </div>
            <div className="j-meta">
              <span style={{display:'flex',alignItems:'center',gap:'5px'}}>
                Formation Process
                <span className="fy-info-btn" onClick={()=>setShowFyInfo(v=>!v)}>?</span>
              </span>
              <span>{journeyPct}%</span>
            </div>
            {showFyInfo && (
              <div className="fy-info-box">
                FutureYou learns who you are by talking to you. The more you share, the more precisely it can guide your next move.
                <span className="fy-info-close" onClick={()=>setShowFyInfo(false)}>×</span>
              </div>
            )}
            <div className={`j-next${!nextMilestone.cta ? ' j-next-loading' : ''}${journeyStage === 'Established' ? ' j-next-gold' : ''}`}
              onClick={()=>{ if (nextMilestone.fyPrompt) openFY(nextMilestone.fyPrompt); }}
            >
              <div className="j-next-signal">{nextMilestone.signal}</div>
              <div className="j-next-obs">{nextMilestone.obs}</div>
              {nextMilestone.cta && <div className="j-next-cta">{nextMilestone.cta}</div>}
            </div>
          </div>

          {/* Recommended Next — building FY wants creator to visit */}
          {(()=>{
            let recBuilding = null;
            if (priorities) {
              for (const p of priorities) {
                const target = typeof p === 'string' ? 'fy' : (p.target || 'fy');
                if (target === 'fy') continue;
                const byModule = ALL_BUILDINGS.find(b => b.module === target);
                if (byModule) { recBuilding = byModule; break; }
                const byId = ALL_BUILDINGS.find(b => b.id === target);
                if (byId) { recBuilding = byId; break; }
              }
              if (!recBuilding) recBuilding = ALL_BUILDINGS[0];
            }
            function openRec() {
              if (!recBuilding) return;
              if (recBuilding.module === 'brand-builder') setActiveModule('brand-builder');
              else if (recBuilding.module === 'ideation') setActiveModule('ideation');
              else if (recBuilding.id === 'distribute') setActiveModule('distribute');
              else openFY(stageFYPrompts[recBuilding.id] || recBuilding.cta);
            }
            return (
              <div className="sidebar-nav">
                <div className="nav-group">FY Recommends</div>
                {!priorities ? (
                  <div className="rec-loading">
                    <div className="fy-spinner" style={{width:18,height:18}}/>
                    <span>Reading your arc...</span>
                  </div>
                ) : recBuilding ? (
                  <div className="rec-card" onClick={openRec}>
                    <div className="rec-icon">{recBuilding.icon}</div>
                    <div className="rec-name">{recBuilding.name}</div>
                    <div className="rec-desc">{recBuilding.desc}</div>
                    {recBuilding.tools && recBuilding.tools.length > 0 && (
                      <div className="rec-tools">
                        {recBuilding.tools.map(t=>(
                          <span key={t} className="rec-tool">{t}</span>
                        ))}
                      </div>
                    )}
                    <div className="rec-cta">{recBuilding.cta}</div>
                  </div>
                ) : null}
              </div>
            );
          })()}
        </div>

        {/* MAIN */}
        <div className="main">
          <StudioWorldHero formation={formation}/>
          {/* Welcome Back Banner */}
          {showWelcome && (
            <div className="fy-arrival">
              <button className="fy-arrival-close" onClick={()=>setShowWelcome(false)}>×</button>
              <div style={{fontSize:'22px',fontWeight:700,color:'var(--white)',lineHeight:1.1,marginBottom:'6px'}}>
                Welcome back, {firstName}.
              </div>
              <div style={{fontSize:'12px',letterSpacing:'0.06em',color:'var(--cyan)',opacity:0.8}}>
                {studioName}
              </div>
            </div>
          )}

          {/* FY Arrival Banner */}
          {showArrival && formation.fyFirstWords && (
            <div className="fy-arrival">
              <div className="fy-arrival-label">
                <div className="fy-dot"/>
                Future You — First Words
              </div>
              <div className="fy-arrival-text">
                {arrivedText}
                {!arrivedDone && <span className="fy-type-cursor"/>}
              </div>
              {arrivedDone && (
                <button className="fy-arrival-close" onClick={()=>setShowArrival(false)}>×</button>
              )}
            </div>
          )}

          {/* Lot Header */}
          <div className="lot-hd">
            <div className="lot-ey">The Lot</div>
            <div className="lot-title">{studioName}</div>
            <div className="lot-sub">
              {priorities
                ? `${openCount} stages · ${journeyStage} · FutureYou is your guide`
                : `Opening your lot · FutureYou is reading your formation...`
              }
            </div>
            <div className="lot-stats">
              <div className="lot-stat">
                <div className="lot-stat-v">0</div>
                <div className="lot-stat-l">IP Items</div>
              </div>
              <div className="lot-stat">
                <div className="lot-stat-v">0</div>
                <div className="lot-stat-l">Brand Assets</div>
              </div>
              <div className="lot-stat">
                <div className="lot-stat-v">0</div>
                <div className="lot-stat-l">Deals Tracked</div>
              </div>
              <div className="lot-stat">
                <div className="lot-stat-v">{openCount}</div>
                <div className="lot-stat-l">Buildings Open</div>
              </div>
            </div>
          </div>

          {/* Buildings Grid */}
          <div className="lot-grid">
            {ALL_BUILDINGS.map(b=>(
              <div key={b.id}
                className={`building${flashingBuilding===b.id?' b-flash':''}`}
                onClick={()=>handleBuildingClick(b)}
              >
                <div className="b-top">
                  <div className="b-icon">{b.icon}</div>
                  <div className="b-badge open">{b.id === 'cast' ? 'FY Advisory' : b.id === 'distribute' ? 'FY Strategic' : 'Open'}</div>
                </div>
                <div className="b-name">{b.name}</div>
                <div className="b-desc">{b.desc}</div>
                {!isIndependent && b.tools.length > 0 && (
                  <div className="b-tools">
                    {b.tools.map(t=><div key={t} className="b-tool">{t}</div>)}
                  </div>
                )}
                <div className="b-cta">{b.cta} <span>→</span></div>
              </div>
            ))}
          </div>

          {/* Brand Builder Module */}
          {activeModule === 'brand-builder' && (
            <BrandBuilder formation={formation} onBack={()=>setActiveModule(null)}/>
          )}

          {/* Ideation Brief Module */}
          {activeModule === 'ideation' && (
            <IdeationBrief formation={formation} onBack={()=>setActiveModule(null)}/>
          )}

          {/* Distribute Module */}
          {activeModule === 'distribute' && (
            <DistributeModule
              formation={formation}
              onBack={()=>setActiveModule(null)}
              onTalkToFY={()=>{ setActiveModule(null); openFY(stageFYPrompts['distribute']); }}
            />
          )}
        </div>
      </div>

      {/* FY Chat */}
      {showFY && <FYChat formation={formation} initialPrompt={fyInitialPrompt} onClose={()=>{ setShowFY(false); setFyInitialPrompt(null); }}/>}
    </>
  );
}

// ── REACTOR HELPERS ──────────────────────────────────────────────────────────

function studioSeed(name) {
  if (!name) return 42;
  let h = 5381;
  for (let i = 0; i < name.length; i++) {
    h = ((h << 5) + h) ^ name.charCodeAt(i);
    h = h >>> 0;
  }
  return h || 1;
}

function buildStudioWorldPrompt(formation) {
  const studioName   = formation.studioName || 'Studio';
  const contentTypes = (formation.contentTypes || []).join(', ') || 'creative work';
  const platforms    = (formation.platforms || []).join(', ') || 'digital platforms';
  const type         = formation.creatorType || 'multi-format';

  const desc = {
    documentary: `cinematic production lot at golden hour — camera cranes, a director's chair facing an LED volume wall, documentary cameras on fluid heads. Warm tungsten and natural light, anamorphic wide shot, film grain, atmospheric depth.`,
    social:      `sleek modern creator loft — ring lights on a clean backdrop, motorized camera slider, screens displaying vertical content analytics. Contemporary warm tones, organized for ${platforms}, energetic and purposeful.`,
    youtube:     `polished content studio — dramatic backlit shelving, acoustic panels, cinema camera on fluid head tripod, editorial desk with dual monitors. Golden hour through clerestory windows, sophisticated and considered.`,
    podcast:     `broadcast-quality podcast studio — geometric acoustic foam, round table with high-end condenser microphones, moody amber and blue lighting, a glowing mixing board. Intimate, professional, built for long-form.`,
    'multi-format': `full-service creative complex — photography cyclorama, cinema cameras, podcast corner with microphone arms, writing desk with north-facing light. High ceilings, designed for every format of ${contentTypes}.`,
  }[type] || `full-service creative studio built for ${contentTypes} across ${platforms}.`;

  return `${studioName} — a professional ${desc} The studio name visible on the wall. Cinematic wide shot, warm atmospheric lighting, dramatic depth of field, the feeling of a working creative operation at the height of its craft. Ultra-detailed, cinematic color grade.`;
}

// ── STUDIO WORLD HERO — Dashboard live ambient ────────────────────────────────

function StudioWorldHero({ formation }) {
  const videoRef   = React.useRef(null);
  const reactorRef = React.useRef(null);
  const [streaming, setStreaming]   = React.useState(false);
  const [dismissed, setDismissed]   = React.useState(false);
  const [sdkReady, setSdkReady]     = React.useState(!!window.ReactorSDKClass);

  React.useEffect(() => {
    if (sdkReady) return;
    const handler = () => setSdkReady(true);
    window.addEventListener('reactor-sdk-ready', handler);
    return () => window.removeEventListener('reactor-sdk-ready', handler);
  }, [sdkReady]);

  React.useEffect(() => {
    if (!sdkReady || dismissed) return;
    let cancelled = false;

    async function init() {
      try {
        const sessionToken = (() => { try { return localStorage.getItem('sy_session') || ''; } catch { return ''; } })();
        const res = await fetch(`${API_URL}/api/reactor/token`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${sessionToken}` },
        });
        if (!res.ok || cancelled) return;
        const { jwt } = await res.json();
        if (!jwt || cancelled) return;

        const reactor = new window.ReactorSDKClass({ modelName: 'helios' });
        reactorRef.current = reactor;

        reactor.on('trackReceived', (name, track, stream) => {
          if (videoRef.current) {
            videoRef.current.srcObject = stream;
            videoRef.current.play().catch(() => {});
          }
          if (!cancelled) setStreaming(true);
        });

        await reactor.connect(jwt);

        // Seed tied to email → same world on every return visit
        const email = (() => { try { return localStorage.getItem('sy_email') || ''; } catch { return ''; } })();
        await reactor.sendCommand('set_seed', { seed: studioSeed(email || formation.studioName) });
        await reactor.sendCommand('set_prompt', { prompt: buildStudioWorldPrompt(formation) });
        await reactor.sendCommand('start', {});
      } catch(e) {
        console.warn('[StudioWorldHero] init failed:', e);
      }
    }

    init();

    function onVisibility() {
      if (!reactorRef.current) return;
      if (document.hidden) reactorRef.current.sendCommand('pause', {}).catch(() => {});
      else reactorRef.current.sendCommand('resume', {}).catch(() => {});
    }
    document.addEventListener('visibilitychange', onVisibility);

    return () => {
      cancelled = true;
      document.removeEventListener('visibilitychange', onVisibility);
      if (reactorRef.current) reactorRef.current.sendCommand('pause', {}).catch(() => {});
    };
  }, [sdkReady, dismissed]);

  if (dismissed) return null;

  return (
    <div style={{
      position:'relative', height:'200px', overflow:'hidden',
      borderBottom:'1px solid var(--border)', flexShrink:0,
    }}>
      {/* Fallback background while connecting */}
      <div style={{
        position:'absolute', inset:0,
        background:'linear-gradient(135deg, var(--navy-3) 0%, var(--navy-2) 100%)',
      }}/>
      <video
        ref={videoRef}
        muted playsInline
        style={{
          position:'absolute', inset:0, width:'100%', height:'100%',
          objectFit:'cover',
          opacity: streaming ? 0.75 : 0,
          transition: 'opacity 2.5s ease',
        }}
      />
      {/* Gradient overlay for readability */}
      <div style={{
        position:'absolute', inset:0, pointerEvents:'none',
        background:'linear-gradient(to bottom, rgba(6,9,26,0.25) 0%, rgba(6,9,26,0.65) 100%)',
      }}/>
      {/* Labels */}
      <div style={{
        position:'absolute', inset:0, padding:'14px 18px',
        display:'flex', flexDirection:'column', justifyContent:'flex-end', zIndex:2,
      }}>
        <div style={{display:'flex', alignItems:'center', gap:'8px', marginBottom:'5px'}}>
          <div style={{
            width:'5px', height:'5px', borderRadius:'50%',
            background: streaming ? '#4cff91' : 'rgba(240,242,255,0.25)',
            animation: streaming ? 'fyGreenPulse 2.5s ease-in-out infinite' : 'none',
            flexShrink:0,
          }}/>
          <span style={{
            fontSize:'8px', letterSpacing:'0.22em', textTransform:'uppercase',
            color: streaming ? 'rgba(76,255,145,0.75)' : 'rgba(240,242,255,0.25)',
          }}>
            {streaming ? 'Studio World · Live' : 'Studio World · Connecting...'}
          </span>
          <button
            onClick={() => setDismissed(true)}
            style={{
              marginLeft:'auto', background:'none', border:'none', cursor:'pointer',
              color:'rgba(240,242,255,0.25)', fontSize:'18px', lineHeight:1,
              padding:'2px 4px', transition:'color 0.15s',
            }}
            onMouseEnter={e => e.target.style.color='rgba(240,242,255,0.6)'}
            onMouseLeave={e => e.target.style.color='rgba(240,242,255,0.25)'}
          >×</button>
        </div>
        <div style={{
          fontFamily:"'Bebas Neue', sans-serif",
          fontSize:'14px', letterSpacing:'0.05em',
          color:'rgba(240,242,255,0.35)',
        }}>
          {formation.studioName || 'Your Studio'}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<AppShell/>);
