<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudioYou — Build Studio YOU.</title>
<link rel="icon" type="image/png" href="assets/SY_OFFICIAL_SHUTTER_KEY.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500&family=Playfair+Display:ital,wght@1,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black:   #06091a;
    --navy:    #0b0d1a;
    --white:   #f0f2ff;
    --dim:     rgba(240,242,255,0.65);
    --mute:    rgba(240,242,255,0.3);
    --ghost:   rgba(240,242,255,0.06);
    --cyan:    #00c8ff;
    --purple:  #7b35d4;
    --grad:    linear-gradient(135deg, #00c8ff 0%, #5e28a8 60%, #7b35d4 100%);
    --gradT:   linear-gradient(135deg, #00c8ff 0%, #a06be8 100%);
  }
  html, body, #root { height: 100%; }
  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Outfit', sans-serif;
    font-weight: 300;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
    background-size: 256px; pointer-events: none; z-index: 9999;
  }

  /* ── PROCESS INDICATOR — Claude-style, fixed position, cursor free ── */
  #processOverlay {
    display: none;
    position: fixed;
    bottom: 28px; right: 28px;
    z-index: 9000;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
    pointer-events: none;
  }
  #processOverlay.active { display: flex; }
  #processStatus {
    font-family: 'Outfit', sans-serif;
    font-size: 11px; letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--cyan); opacity: 0.8;
    text-align: right;
    line-height: 1.5;
    white-space: nowrap;
    border-right: 2px solid var(--cyan);
    padding-right: 6px;
  }
  #processSpinner {
    width: 36px; height: 36px;
    object-fit: contain;
    animation: spinnerFloat 2s ease-in-out infinite;
  }
  @keyframes spinnerFloat {
    0%,100% { transform: translateY(0); opacity: 0.85; }
    50%      { transform: translateY(-4px); opacity: 1; }
  }
  body.processing { cursor: auto; }

  /* ── AMBIENT GLOW */
  .amb {
    position: fixed; border-radius: 50%;
    pointer-events: none; z-index: 0;
    transition: all 2s ease;
  }
  .amb-1 { top: -20vh; left: -10vw; width: 70vw; height: 70vh;
    background: radial-gradient(ellipse, rgba(0,200,255,0.06) 0%, transparent 70%); }
  .amb-2 { bottom: -10vh; right: -15vw; width: 60vw; height: 60vh;
    background: radial-gradient(ellipse, rgba(123,53,212,0.07) 0%, transparent 70%); }

  /* ── LAYOUT */
  .screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 10; padding: 48px;
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .screen.hidden { opacity: 0; pointer-events: none; transform: translateY(24px); }
  .screen.out { opacity: 0; pointer-events: none; transform: translateY(-24px); }

  /* ── LOGO NAV */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0;
    padding: 20px 36px;
    display: flex; justify-content: space-between; align-items: center;
    z-index: 100;
  }
  .topbar img { height: 40px; width: auto; }
  .topbar-logo-wrap {
    position: relative; display: flex; align-items: center; cursor: pointer;
  }
  .topbar-logo-wrap img { transition: filter 0.15s ease, transform 0.15s ease; }
  .topbar-logo-wrap:hover img { filter: brightness(1.25); transform: scale(1.08); }
  .topbar-logo-wrap:active img { transform: scale(0.94); }
  .studio-menu {
    position: absolute; top: calc(100% + 8px); left: 0;
    width: 220px;
    background: #0b0d1a;
    border: 1px solid rgba(0,200,255,0.18);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    z-index: 500;
    animation: menuIn 0.15s ease;
  }
  @keyframes menuIn {
    from { opacity:0; transform:translateY(-6px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .studio-menu::before {
    content:''; position:absolute; top:0; left:0; right:0; height:1px;
    background: linear-gradient(135deg,#00c8ff,#7b35d4);
  }
  .studio-menu-section {
    font-size:8px; letter-spacing:0.28em; text-transform:uppercase;
    color:rgba(240,242,255,0.25); padding:12px 16px 6px;
  }
  .studio-menu-item {
    display:flex; align-items:center; gap:10px;
    padding:10px 16px; cursor:pointer;
    font-size:12px; letter-spacing:0.06em; color:rgba(240,242,255,0.7);
    transition:background 0.15s, color 0.15s;
    border:none; background:none; width:100%; text-align:left;
    font-family:'Outfit',sans-serif;
  }
  .studio-menu-item:hover { background:rgba(0,200,255,0.06); color:#f0f2ff; }
  .studio-menu-item.danger { color:rgba(255,100,100,0.6); }
  .studio-menu-item.danger:hover { background:rgba(255,100,100,0.06); color:rgba(255,100,100,0.9); }
  .studio-menu-divider { height:1px; background:rgba(240,242,255,0.06); margin:4px 0; }
  .topbar-label {
    font-size: 9px; letter-spacing: 0.28em;
    text-transform: uppercase; color: var(--mute);
  }

  /* ── PROGRESS BAR */
  .progress-track {
    position: fixed; top: 0; left: 0; right: 0;
    height: 2px; background: rgba(0,200,255,0.08);
    z-index: 200;
  }
  .progress-fill {
    height: 100%;
    background: var(--grad);
    transition: width 1s ease;
  }

  /* ── PHASE LABEL */
  .phase-label {
    position: fixed; bottom: 32px; left: 50%;
    transform: translateX(-50%);
    font-size: 9px; letter-spacing: 0.28em;
    text-transform: uppercase; color: var(--mute);
    z-index: 100;
    transition: opacity 0.5s ease;
  }

  /* ── FY FORM — the animated presence */
  .fy-container {
    position: fixed;
    right: 6vw; top: 50%;
    transform: translateY(-50%);
    width: clamp(110px, 12vw, 160px);
    height: clamp(110px, 12vw, 160px);
    z-index: 50;
    transition: opacity 1.5s ease;
  }
  .fy-form {
    width: 100%; height: 100%;
    position: relative;
  }
  .fy-svg { width: 100%; height: 100%; overflow: visible; }

  /* ── QUESTION AREA */
  .q-wrap {
    max-width: 560px; width: 100%;
    display: flex; flex-direction: column;
    gap: 0;
    margin-right: clamp(0px, 22vw, 280px);
  }
  .q-phase {
    font-size: 9px; letter-spacing: 0.3em;
    text-transform: uppercase; color: var(--cyan);
    opacity: 0.6; margin-bottom: 20px;
    display: flex; align-items: center; gap: 10px;
  }
  .q-phase::before {
    content: ''; width: 18px; height: 1px;
    background: var(--cyan); opacity: 0.5;
  }
  .q-text {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(22px, 3vw, 36px);
    line-height: 1.4;
    color: var(--white);
    margin-bottom: 36px;
  }
  .q-subtext {
    font-size: 13px; color: var(--mute);
    margin-top: -24px; margin-bottom: 28px;
    line-height: 1.6;
  }

  /* ── INPUTS */
  .q-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(0,200,255,0.2);
    color: var(--white);
    font-family: 'Outfit', sans-serif;
    font-size: 18px; font-weight: 300;
    padding: 12px 0;
    width: 100%; outline: none;
    transition: border-color 0.3s ease;
    caret-color: var(--cyan);
  }
  .q-input:focus { border-color: var(--cyan); }
  .q-input::placeholder { color: var(--mute); }

  .q-textarea {
    background: rgba(0,200,255,0.03);
    border: 1px solid rgba(0,200,255,0.12);
    border-radius: 2px;
    color: var(--white);
    font-family: 'Outfit', sans-serif;
    font-size: 16px; font-weight: 300;
    padding: 16px 18px;
    width: 100%; outline: none;
    resize: none; min-height: 120px;
    transition: border-color 0.3s ease;
    caret-color: var(--cyan);
    line-height: 1.7;
  }
  .q-textarea:focus { border-color: rgba(0,200,255,0.35); }
  .q-textarea::placeholder { color: var(--mute); }

  /* ── MULTI SELECT */
  .q-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
  .chip {
    padding: 8px 16px;
    border: 1px solid rgba(0,200,255,0.15);
    color: var(--mute);
    font-size: 12px; letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s ease;
    background: transparent;
    font-family: 'Outfit', sans-serif;
  }
  .chip:hover { border-color: rgba(0,200,255,0.4); color: var(--white); }
  .chip.active {
    border-color: var(--cyan); color: var(--cyan);
    background: rgba(0,200,255,0.08);
  }

  /* ── RANGE SELECTOR */
  .q-range { display: flex; gap: 6px; flex-wrap: wrap; }
  .range-opt {
    padding: 10px 18px;
    border: 1px solid rgba(240,242,255,0.08);
    color: var(--mute); font-size: 13px;
    cursor: pointer; transition: all 0.2s ease;
    background: transparent;
    font-family: 'Outfit', sans-serif;
  }
  .range-opt:hover { border-color: rgba(0,200,255,0.3); color: var(--white); }
  .range-opt.active {
    border-color: var(--cyan); color: var(--cyan);
    background: rgba(0,200,255,0.06);
  }

  /* ── ACTION ROW */
  .q-actions {
    display: flex; align-items: center;
    gap: 20px; margin-top: 28px;
  }
  .btn-continue {
    background: var(--grad);
    border: none; color: var(--black);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px; letter-spacing: 0.14em;
    padding: 14px 32px;
    cursor: pointer;
    transition: opacity 0.2s ease, transform 0.15s ease;
  }
  .btn-continue:hover { opacity: 0.85; transform: translateX(2px); }
  .btn-continue:disabled { opacity: 0.3; cursor: default; transform: none; }
  .btn-pass {
    background: transparent; border: none;
    color: var(--mute); font-size: 11px;
    letter-spacing: 0.18em; text-transform: uppercase;
    cursor: pointer; font-family: 'Outfit', sans-serif;
    transition: color 0.2s ease; padding: 0;
  }
  .btn-pass:hover { color: var(--white); }

  /* ── PHASE 0 — THE FRAME */
  .frame-wrap {
    max-width: 600px; text-align: center;
    margin-right: clamp(0px, 22vw, 280px);
  }
  .frame-eyebrow {
    font-size: 9px; letter-spacing: 0.3em;
    text-transform: uppercase; color: var(--cyan);
    opacity: 0.6; margin-bottom: 32px;
  }
  .frame-headline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 8vw, 96px);
    line-height: 0.92; margin-bottom: 32px;
  }
  .frame-headline .grad {
    background: var(--gradT);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .frame-body {
    font-size: 16px; line-height: 1.8;
    color: var(--dim); margin-bottom: 48px;
    max-width: 480px; margin-left: auto; margin-right: auto;
  }
  .btn-begin {
    background: var(--grad); border: none;
    color: var(--black);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; letter-spacing: 0.16em;
    padding: 18px 52px; cursor: pointer;
    transition: filter 0.15s ease, transform 0.15s ease;
    display: inline-block;
    position: relative; overflow: hidden;
    box-shadow: 0 0 0 2px rgba(0,200,255,0.2), 0 0 18px rgba(0,200,255,0.25);
    animation: beginGlow 3s ease-in-out infinite;
  }
  .btn-begin::after {
    content: '';
    position: absolute;
    top: -50%; left: -75%;
    width: 45%; height: 200%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.45), transparent);
    transform: skewX(-18deg);
    animation: beginGlint 6.75s ease-in-out infinite;
    pointer-events: none;
  }
  .btn-begin:hover { filter: brightness(1.1); transform: translateY(-2px); }
  @keyframes beginGlow {
    0%,100% { box-shadow: 0 0 0 2px rgba(0,200,255,0.2), 0 0 18px rgba(0,200,255,0.2); }
    50%      { box-shadow: 0 0 0 2px rgba(0,200,255,0.45), 0 0 32px rgba(0,200,255,0.5), 0 0 52px rgba(0,200,255,0.15); }
  }
  @keyframes beginGlint {
    0%, 65%  { left: -75%; }
    80%      { left: 125%; }
    100%     { left: 125%; }
  }

  /* ── PHASE 6 — THE LOT */
  .lot-wrap {
    width: 100%; max-width: 900px;
    display: flex; flex-direction: column; gap: 32px;
  }
  .lot-header {
    text-align: center;
  }
  .lot-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(36px, 6vw, 72px);
    background: var(--gradT);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; line-height: 1;
  }
  .lot-sub {
    font-size: 11px; letter-spacing: 0.24em;
    text-transform: uppercase; color: var(--mute);
    margin-top: 8px;
  }
  .buildings-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
    background: rgba(0,200,255,0.05);
  }
  .building {
    padding: 24px 20px;
    background: var(--black);
    position: relative; overflow: hidden;
    opacity: 0;
    transition: opacity 0.6s ease, background 0.3s ease;
    cursor: default;
  }
  .building.revealed { opacity: 1; }
  .building.locked { cursor: default; }
  .building::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: var(--grad);
    transform: scaleX(0); transform-origin: left;
    transition: transform 0.5s ease;
  }
  .building.revealed.unlocked::before { transform: scaleX(1); }
  .building.unlocked:hover { background: rgba(0,200,255,0.04); }
  .b-icon {
    font-size: 22px; margin-bottom: 10px;
    filter: grayscale(1); opacity: 0.4;
    transition: filter 0.5s ease, opacity 0.5s ease;
  }
  .building.unlocked .b-icon { filter: grayscale(0); opacity: 1; }
  .b-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px; letter-spacing: 0.08em;
    color: var(--mute);
    transition: color 0.5s ease;
  }
  .building.unlocked .b-name { color: var(--white); }
  .b-status {
    font-size: 9px; letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 6px;
    color: rgba(0,200,255,0.5);
  }
  .building.locked .b-status { color: rgba(240,242,255,0.2); }
  .b-lock { position: absolute; top: 16px; right: 16px; opacity: 0.2; font-size: 12px; }

  /* ── PHASE 7 — FY SPEAKS */
  .fy-speak-wrap {
    max-width: 620px;
    margin-right: clamp(0px, 22vw, 280px);
  }
  .fy-speak-label {
    font-size: 9px; letter-spacing: 0.3em;
    text-transform: uppercase; color: var(--cyan);
    opacity: 0.6; margin-bottom: 28px;
    display: flex; align-items: center; gap: 10px;
  }
  .fy-speak-label::before {
    content: ''; width: 18px; height: 1px;
    background: var(--cyan); opacity: 0.5;
  }
  .fy-speak-text {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(18px, 2.4vw, 28px);
    line-height: 1.65; color: var(--white);
    margin-bottom: 40px;
    min-height: 120px;
  }
  .fy-speak-text .cursor {
    display: inline-block;
    width: 20px;
    height: 20px;
    vertical-align: middle;
    margin-left: 4px;
    background: url('assets/shutter1.gif') center/contain no-repeat;
  }
  /* blink keyframe removed — cursor replaced with GIF */

  /* FY DATA CARD */
  .fy-data-card {
    position: fixed;
    bottom: 32px; left: 50%;
    transform: translateX(-50%);
    width: clamp(320px, 90vw, 520px);
    background: var(--navy);
    border: 1px solid rgba(0,200,255,0.2);
    padding: 24px 28px;
    z-index: 200;
    animation: cardIn 0.5s ease;
  }
  @keyframes cardIn {
    from { opacity:0; transform: translateX(-50%) translateY(16px); }
    to   { opacity:1; transform: translateX(-50%) translateY(0); }
  }
  .fy-data-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(135deg, #00c8ff, #7b35d4);
  }
  .fy-data-card-label {
    font-size: 8px; letter-spacing: 0.28em;
    text-transform: uppercase; color: var(--cyan);
    opacity: 0.7; margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .fy-data-card-text {
    font-size: 13px; line-height: 1.7;
    color: var(--dim); margin-bottom: 18px;
  }
  .fy-data-card-actions {
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  }
  .fy-data-card-email {
    flex: 1; min-width: 160px;
    background: rgba(0,200,255,0.06);
    border: 1px solid rgba(0,200,255,0.2);
    color: var(--white); font-family: 'Outfit', sans-serif;
    font-size: 13px; font-weight: 300;
    padding: 9px 14px; outline: none;
    caret-color: var(--cyan); transition: border-color 0.2s ease;
  }
  .fy-data-card-email:focus { border-color: var(--cyan); }
  .fy-data-card-email::placeholder { color: var(--mute); }
  .fy-data-card-save {
    background: var(--grad); border: none; color: var(--black);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px; letter-spacing: 0.12em;
    padding: 9px 20px; cursor: pointer; white-space: nowrap;
    transition: opacity 0.2s ease;
  }
  .fy-data-card-save:hover { opacity: 0.85; }
  .fy-data-card-dismiss {
    font-size: 10px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--mute);
    cursor: pointer; background: none; border: none;
    font-family: 'Outfit', sans-serif; padding: 0;
    transition: color 0.2s ease; white-space: nowrap;
  }
  .fy-data-card-dismiss:hover { color: var(--white); }
  .fy-data-card-confirmed {
    font-size: 12px; color: var(--cyan);
    font-family: 'Playfair Display', serif; font-style: italic;
  }

  /* ── FORMATION EXPLAINER MODAL */
  .formation-modal-overlay {
    position: fixed; inset: 0;
    background: rgba(6,9,26,0.85);
    backdrop-filter: blur(6px);
    z-index: 500;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  .formation-modal {
    max-width: 480px; width: 100%;
    background: var(--navy);
    border: 1px solid rgba(0,200,255,0.18);
    padding: 36px 40px;
    position: relative;
  }
  .formation-modal::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(135deg, #00c8ff, #7b35d4);
  }
  .formation-modal-label {
    font-size: 9px; letter-spacing: 0.3em;
    text-transform: uppercase; color: var(--cyan);
    opacity: 0.7; margin-bottom: 16px;
  }
  .formation-modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; letter-spacing: 0.06em;
    color: var(--white); margin-bottom: 20px;
  }
  .formation-modal-body {
    font-size: 14px; line-height: 1.8;
    color: var(--dim); margin-bottom: 28px;
  }
  .formation-modal-body p { margin-bottom: 14px; }
  .formation-modal-body p:last-child { margin-bottom: 0; }
  .formation-modal-close {
    background: var(--grad); border: none;
    color: var(--black);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px; letter-spacing: 0.14em;
    padding: 12px 28px; cursor: pointer;
    transition: opacity 0.2s ease;
  }
  .formation-modal-close:hover { opacity: 0.85; }
  .formation-q-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 1px solid rgba(0,200,255,0.35);
    color: var(--cyan); font-size: 10px;
    font-family: 'Outfit', sans-serif;
    font-weight: 500; cursor: pointer;
    margin-left: 8px;
    background: transparent;
    transition: all 0.2s ease;
    vertical-align: middle;
    line-height: 1;
    flex-shrink: 0;
  }
  .formation-q-btn:hover {
    background: rgba(0,200,255,0.12);
    border-color: var(--cyan);
  }

  /* ── LANDING PAGE */

// ── GLOBAL PROCESS CURSOR UTILITY ────────────────────────────────────────────

function startProcessing(msg) {
  const el = document.getElementById('processOverlay');
  const status = document.getElementById('processStatus');
  if (msg) {
    status.textContent = msg;
    status.style.display = 'block';
  } else {
    status.style.display = 'none';
  }
  el.classList.add('active');
}
function stopProcessing() {
  document.getElementById('processOverlay').classList.remove('active');
  document.getElementById('processStatus').textContent = '';
}

// ── TOPBAR TYPEWRITER ─────────────────────────────────────────────────────────
var _tbHandle = null;
function runTopbarTypewriter() {
  var el = document.querySelector('.topbar-label');
  if (!el) return;
  var msg = el.dataset.msg || el.textContent || 'Building your studio';
  el.textContent = '';
  var i = 0;
  function tick() {
    if (i < msg.length) {
      el.textContent += msg[i++];
      _tbHandle = setTimeout(tick, 40);
    } else {
      _tbHandle = setTimeout(function() {
        el.textContent = '';
        i = 0;
        tick();
      }, 3000);
    }
  }
  tick();
}

// ── STUDIO NAME INPUT — with availability check ───────────────────────────

// Client-side name check — hits real Supabase via backend.
function checkAvailability(name) {
  return new Promise(async (resolve) => {
    try {
      const res = await fetch(
        `https://studioyou-api-198959034459.us-east1.run.app/api/check-studio-name?name=${encodeURIComponent(name)}`
      );
      const data = await res.json();
      resolve(data.available === true);
    } catch(e) {
      resolve(true); // fail open if backend unreachable
    }
  });
}

function StudioNameInput({ value, onChange, onStatusChange }) {
  const [status, setStatus] = React.useState('empty'); // empty | checking | available | taken
  const debounceRef = React.useRef(null);

  React.useEffect(() => {
    if (!value || value.trim().length < 2) {
      setStatus('empty');
      onStatusChange('empty');
      return;
    }
    setStatus('checking');
    onStatusChange('checking');
    startProcessing('Checking studio name...');
    clearTimeout(debounceRef.current);
    debounceRef.current = setTimeout(async () => {
      const available = await checkAvailability(value.trim());
      const result = available ? 'available' : 'taken';
      setStatus(result);
      onStatusChange(result);
      stopProcessing();
    }, 500);
    return () => clearTimeout(debounceRef.current);
  }, [value]);

  const statusText = {
    empty: '',
    checking: 'Checking availability...',
    available: 'Cool name. Let\'s go!',
    taken: 'Unavailable.',
  };

  return (
    <div className="studio-name-wrap">
      <div className="studio-name-input-row">
        <input
          className="q-input"
          value={value}
          onChange={e => onChange(e.target.value)}
          placeholder="Your studio name..."
          autoComplete="off"
          spellCheck="false"
          style={{ flex: 1 }}
        />
      </div>
      <div className={`studio-name-status ${status}`}>
        {status !== 'empty' && <div className="sn-dot"/>}
        {statusText[status]}
      </div>
    </div>
  );
}

// ── FY FORMATION CHAT ────────────────────────────────────────────────────────

const FY_FIELDS = ['contentTypes','platforms','experience','origin','goal1yr','biggestFear'];

function FYFormationChat({ onComplete, onFormationChange }) {
  const [displayMessages, setDisplayMessages] = React.useState([]);
  const [apiMessages, setApiMessages]         = React.useState([]);
  const [formation, setFormation]             = React.useState({});
  const [inputText, setInputText]             = React.useState('');
  const [suggestions, setSuggestions]         = React.useState([]);
  const [isTyping, setIsTyping]               = React.useState(false);
  const [isComplete, setIsComplete]           = React.useState(false);
  const inputRef      = React.useRef(null);
  const messagesEnd   = React.useRef(null);

  const filledCount = FY_FIELDS.filter(f => {
    const v = formation[f];
    return v && (Array.isArray(v) ? v.length > 0 : v !== '');
  }).length;

  // Scroll to bottom whenever messages change
  React.useEffect(() => {
    messagesEnd.current?.scrollIntoView({ behavior: 'smooth' });
  }, [displayMessages]);

  // On mount: restore draft or start fresh
  React.useEffect(() => {
    try {
      const raw = localStorage.getItem('sy_formation_draft');
      if (raw) {
        const draft = JSON.parse(raw);
        if (draft.apiMessages && draft.apiMessages.length > 0) {
          // Reconstruct display messages from saved API history
          const display = [];
          draft.apiMessages.forEach(m => {
            if (m.role === 'assistant') {
              try {
                const p = JSON.parse(m.content);
                if (p.message) display.push({ role:'fy', text: p.message });
              } catch(e) {}
            } else if (m.role === 'user' && m.content !== 'Start the formation conversation.') {
              display.push({ role:'user', text: m.content });
            }
          });
          if (display.length > 0) {
            setApiMessages(draft.apiMessages);
            setFormation(draft.formation || {});
            if (onFormationChange) onFormationChange(draft.formation || {});
            setDisplayMessages(display);
            return; // Resume without calling API — show last state
          }
        }
      }
    } catch(e) {}
    // Fresh start
    callFY([], {});
  }, []);

  async function callFY(currentApiMsgs, currentFormation) {
    setIsTyping(true);
    setSuggestions([]);
    startProcessing('FutureYou is listening...');

    try {
      const res = await fetch(`${API_URL}/api/formation/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: currentApiMsgs, formation: currentFormation }),
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.error || 'No response');

      const fyMsg      = data.message || '';
      const newForm    = { ...currentFormation, ...(data.formation || {}) };
      const complete   = data.complete || false;
      const chips      = data.suggestions || [];

      // Store as assistant message in API history (JSON so Claude can read it back)
      const assistantApiMsg = {
        role: 'assistant',
        content: JSON.stringify({ message: fyMsg, formation: newForm, complete, suggestions: chips }),
      };
      const updatedApiMsgs = [...currentApiMsgs, assistantApiMsg];

      setFormation(newForm);
      setApiMessages(updatedApiMsgs);
      if (onFormationChange) onFormationChange(newForm);

      // Persist draft
      try {
        localStorage.setItem('sy_formation_draft', JSON.stringify({
          apiMessages: updatedApiMsgs,
          formation: newForm,
          savedAt: new Date().toISOString(),
        }));
      } catch(e) {}

      stopProcessing();
      typewriteFY(fyMsg, () => {
        setIsTyping(false);
        if (complete) {
          setIsComplete(true);
          setSuggestions([]);
          setTimeout(() => onComplete(newForm, fyMsg), 1200);
        } else {
          setSuggestions(chips);
          setTimeout(() => inputRef.current?.focus(), 80);
        }
      });

    } catch(e) {
      stopProcessing();
      setIsTyping(false);
      typewriteFY("Something went wrong reaching FutureYou. Try sending your message again.", () => {});
    }
  }

  function typewriteFY(text, onDone) {
    const id = Date.now();
    setDisplayMessages(prev => [...prev, { role:'fy', text:'', id }]);
    let i = 0;
    const iv = setInterval(() => {
      if (i < text.length) {
        i++;
        setDisplayMessages(prev => prev.map(m => m.id === id ? { ...m, text: text.slice(0, i) } : m));
      } else {
        clearInterval(iv);
        if (onDone) onDone();
      }
    }, 22);
  }

  async function sendMessage(text) {
    const t = (text || inputText).trim();
    if (!t || isTyping) return;
    setInputText('');
    setSuggestions([]);
    setDisplayMessages(prev => [...prev, { role:'user', text: t }]);
    const userApiMsg = { role:'user', content: t };
    const newApiMsgs = [...apiMessages, userApiMsg];
    setApiMessages(newApiMsgs);
    await callFY(newApiMsgs, formation);
  }

  return (
    <div className="fy-chat-wrap">
      {/* Progress indicator — 6 dots */}
      <div className="fy-chat-progress">
        {FY_FIELDS.map(f => {
          const v = formation[f];
          const filled = v && (Array.isArray(v) ? v.length > 0 : v !== '');
          return <div key={f} className={`fy-chat-dot${filled ? ' filled' : ''}`}/>;
        })}
        <span className="fy-chat-dot-label">
          {filledCount > 0 ? `${filledCount} of 6` : 'Formation'}
        </span>
      </div>

      {/* Messages */}
      <div className="fy-chat-messages">
        {displayMessages.map((m, i) => (
          <div key={i} className={`fy-chat-msg-${m.role}`}>
            {m.role === 'fy'
              ? <span>{m.text}{isTyping && i === displayMessages.length - 1 && <span className="cursor"/>}</span>
              : <span>{m.text}</span>
            }
          </div>
        ))}
        <div ref={messagesEnd}/>
      </div>

      {/* Suggestion chips */}
      {suggestions.length > 0 && !isTyping && (
        <div className="fy-chat-suggestions">
          {suggestions.map(s => (
            <div key={s} className="chip" onClick={() => sendMessage(s)}>{s}</div>
          ))}
        </div>
      )}

      {/* Input */}
      {!isComplete && (
        <div className="fy-chat-input-row">
          <textarea
            ref={inputRef}
            className="fy-chat-input"
            value={inputText}
            onChange={e => setInputText(e.target.value)}
            onKeyDown={e => {
              if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
            }}
            placeholder={isTyping ? '' : 'Tell FutureYou...'}
            disabled={isTyping}
            rows={2}
          />
          <button
            className="fy-chat-send"
            onClick={() => sendMessage()}
            disabled={isTyping || !inputText.trim()}
          >→</button>
        </div>
      )}
    </div>
  );
}

// ── VISUAL IDENTITY PHASE ─────────────────────────────────────────────────────

function VisualIdentityPhase({ answers, onComplete }) {
  const [contentLink, setContentLink] = React.useState('');
  const [photos, setPhotos] = React.useState([]);
  const [selfieMode, setSelfieMode] = React.useState(false);
  const [capturing, setCapturing] = React.useState(false);
  const [facesDetected, setFacesDetected] = React.useState({});
  const videoRef = React.useRef(null);
  const canvasRef = React.useRef(null);

  const maxPhotos = 8;
  const minPhotos = 4;

  const handlePhotoUpload = async (e) => {
    const files = Array.from(e.target.files || []);
    for (const file of files) {
      if (photos.length >= maxPhotos) break;
      const reader = new FileReader();
      reader.onload = async (evt) => {
        const dataUrl = evt.target.result;
        // Store photo — face detection validation optional for MVP
        setPhotos(prev => [...prev, { id: Date.now(), src: dataUrl, hasFace: true }]);
      };
      reader.readAsDataURL(file);
    }
  };

  const handleSelfieCapture = async () => {
    if (!videoRef.current || !canvasRef.current) return;
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    const video = videoRef.current;
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    const dataUrl = canvas.toDataURL('image/jpeg');
    setPhotos(prev => [{ id: Date.now(), src: dataUrl, hasFace: true }, ...prev].slice(0, maxPhotos));
    setSelfieMode(false);
  };

  const removePhoto = (id) => {
    setPhotos(prev => prev.filter(p => p.id !== id));
  };

  const handleComplete = () => {
    if (photos.length < minPhotos && !contentLink) {
      alert(`Please add at least ${minPhotos} photos or a content link`);
      return;
    }
    const visualData = {
      contentLink,
      photos: photos.map(p => p.src),
      collectedAt: new Date().toISOString(),
    };
    onComplete(visualData);
  };

  const startSelfieCapture = async () => {
    setSelfieMode(true);
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
      if (videoRef.current) {
        videoRef.current.srcObject = stream;
      }
    } catch (err) {
      console.error('Camera access denied:', err);
      alert('Camera access required for selfie capture');
      setSelfieMode(false);
    }
  };

  const stopSelfieCapture = () => {
    if (videoRef.current && videoRef.current.srcObject) {
      videoRef.current.srcObject.getTracks().forEach(t => t.stop());
    }
    setSelfieMode(false);
  };

  return (
    <div style={{
      display: 'flex',
      flexDirection: 'column',
      alignItems: 'center',
      justifyContent: 'center',
      minHeight: '100vh',
      padding: '40px 20px',
      fontFamily: "'Outfit', sans-serif",
    }}>
      <div style={{ maxWidth: '600px', width: '100%' }}>
        <h2 style={{
          fontFamily: "'Playfair Display', serif",
          fontSize: '2.5rem',
          marginBottom: '16px',
          color: 'var(--white)',
        }}>Studio Portrait</h2>
        <p style={{ color: 'var(--mute)', marginBottom: '32px', fontSize: '1.1rem' }}>
          Show us your work and your face. We'll weave your actual appearance into your future studio vision.
        </p>

        {/* Content Link Section */}
        <div style={{ marginBottom: '40px' }}>
          <label style={{ display: 'block', marginBottom: '12px', fontSize: '0.95rem', fontWeight: 500 }}>
            Link to your best work <span style={{ color: 'var(--mute)' }}>(optional)</span>
          </label>
          <input
            type="url"
            placeholder="YouTube, TikTok, or Instagram link"
            value={contentLink}
            onChange={(e) => setContentLink(e.target.value)}
            style={{
              width: '100%',
              padding: '12px',
              backgroundColor: 'var(--navy)',
              border: '1px solid var(--ghost)',
              borderRadius: '4px',
              color: 'var(--white)',
              fontSize: '1rem',
            }}
          />
          {contentLink && <p style={{ color: 'var(--cyan)', fontSize: '0.85rem', marginTop: '8px' }}>✓ Link saved</p>}
        </div>

        {/* Photo Upload Section */}
        <div style={{ marginBottom: '40px' }}>
          <label style={{ display: 'block', marginBottom: '12px', fontSize: '0.95rem', fontWeight: 500 }}>
            Upload photos <span style={{ color: 'var(--mute)' }}>({photos.length}/{maxPhotos})</span>
          </label>
          <div style={{
            border: '2px dashed var(--cyan)',
            borderRadius: '8px',
            padding: '24px',
            textAlign: 'center',
            cursor: 'pointer',
            backgroundColor: 'rgba(0, 200, 255, 0.02)',
            marginBottom: '16px',
          }}>
            <input
              type="file"

              accept="image/*"

              <p style={{ color: 'var(--dim)', fontSize: '0.85rem' }}>PNG, JPG, GIF (different angles, lighting)</p>

          {/* Photo Gallery */}
          {photos.length > 0 && (
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(80px, 1fr))', gap: '12px', marginBottom: '16px' }}>
              {photos.map(photo => (
                <div key={photo.id} style={{ position: 'relative', paddingBottom: '100%' }}>
                  <img
                    src={photo.src}
                    alt="uploaded"
                    style={{
                      position: 'absolute',
                      inset: 0,
                      width: '100%',
                      height: '100%',
                      objectFit: 'cover',
                      borderRadius: '4px',
                      border: '1px solid var(--ghost)',
                    }}
                  />
                  <button
                    onClick={() => removePhoto(photo.id)}
                    style={{
                      position: 'absolute',
                      top: '-8px',
                      right: '-8px',
                      width: '24px',
                      height: '24px',
                      borderRadius: '50%',
                      background: '#ff4444',
                      border: 'none',
                      color: 'white',
                      cursor: 'pointer',
                      fontSize: '14px',
                    }}
                  >×</button>
                </div>
              ))}
            </div>
          )}

          {/* Selfie Capture */}
          {!selfieMode && photos.length < maxPhotos && (
            <button
              onClick={startSelfieCapture}
              style={{
                width: '100%',
                padding: '12px',
                backgroundColor: 'var(--navy)',
                border: '1px solid var(--cyan)',
                borderRadius: '4px',
                color: 'var(--cyan)',
                cursor: 'pointer',
                fontSize: '1rem',
                fontWeight: 500,
              }}
            >
              📸 Take a selfie instead
            </button>
          )}

          {selfieMode && (
            <div style={{ marginBottom: '16px' }}>
              <video
                ref={videoRef}
                autoPlay
                muted
                playsInline
                style={{
                  width: '100%',
                  borderRadius: '8px',
                  backgroundColor: 'var(--black)',
                  marginBottom: '12px',
                }}
              />
              <canvas ref={canvasRef} style={{ display: 'none' }} />
              <div style={{ display: 'flex', gap: '12px' }}>
                <button
                  onClick={handleSelfieCapture}
                  style={{
                    flex: 1,
                    padding: '12px',
                    backgroundColor: 'var(--cyan)',
                    color: 'var(--black)',
                    border: 'none',
                    borderRadius: '4px',
                    cursor: 'pointer',
                    fontWeight: 500,
                  }}
                >
                  Capture
                </button>
                <button
                  onClick={stopSelfieCapture}
                  style={{
                    flex: 1,
                    padding: '12px',
                    backgroundColor: 'var(--navy)',
                    color: 'var(--white)',
                    border: '1px solid var(--ghost)',
                    borderRadius: '4px',
                    cursor: 'pointer',
                  }}
                >
                  Cancel
                </button>
              </div>
            </div>
          )}
        </div>

        {/* Complete Button */}
        <button
          onClick={handleComplete}
          disabled={photos.length < minPhotos && !contentLink}
          style={{
            width: '100%',
            padding: '16px',
            backgroundColor: photos.length >= minPhotos || contentLink ? 'var(--cyan)' : 'var(--ghost)',
            color: photos.length >= minPhotos || contentLink ? 'var(--black)' : 'var(--dim)',
            border: 'none',
            borderRadius: '4px',
            fontSize: '1rem',
            fontWeight: 600,
            cursor: photos.length >= minPhotos || contentLink ? 'pointer' : 'not-allowed',
            fontFamily: "'Bebas Neue', sans-serif",
            letterSpacing: '2px',
            textTransform: 'uppercase',
          }}
        >
          {photos.length >= minPhotos || contentLink ? 'Continue to Studio Build' : `Add ${minPhotos - photos.length} more photos`}
        </button>

        <p style={{ color: 'var(--dim)', fontSize: '0.85rem', marginTop: '20px', textAlign: 'center' }}>
          All photos are stored securely and used only to personalize your FutureYou reveal.
        </p>
      </div>
    </div>
  );
}

// ── MAIN APP ─────────────────────────────────────────────────────────────────

function App() {
  const [phase, setPhase] = useState('home');     // 'home',0,'fy',6,7
  const [qIndex, setQIndex] = useState(0);
  const [answers, setAnswers] = useState({});
  const [fyFormation, setFyFormation] = useState({});
  const [currentVal, setCurrentVal] = useState('');
  const [selectedChips, setSelectedChips] = useState([]);
  const [selectedRange, setSelectedRange] = useState(null);
  const [transitioning, setTransitioning] = useState(false);
  const [formationLevel, setFormationLevel] = useState(0);
  const [isPulsing, setIsPulsing] = useState(false);
  const [passToast, setPassToast] = useState(false);
  const [lotBuilt, setLotBuilt] = useState(false);
  const [revealedBuildings, setRevealedBuildings] = useState([]);
  const [unlockedBuildings, setUnlockedBuildings] = useState([]);
  const [fyText, setFyText] = useState('');
  const [fyTyping, setFyTyping] = useState(false);
  const [fyDone, setFyDone] = useState(false);
  const [screenOut, setScreenOut] = useState(false);
  const [showDataCard, setShowDataCard] = useState(false);
  const [dataCardDismissed, setDataCardDismissed] = useState(false);
  const [showFormationExplainer, setShowFormationExplainer] = useState(false);
  const [studioNameStatus, setStudioNameStatus] = useState('empty');
  const [signInEmail, setSignInEmail] = useState('');
  const [signInStatus, setSignInStatus] = useState('idle'); // idle | loading | sent | error
  const [signInError, setSignInError] = useState('');
  const [showLogoMenu, setShowLogoMenu] = useState(false);
  const inputRef = useRef(null);

  useEffect(() => {
    if (!showLogoMenu) return;
    const close = () => setShowLogoMenu(false);
    document.addEventListener('click', close);
    return () => document.removeEventListener('click', close);
  }, [showLogoMenu]);

  async function handleSignIn() {
    const email = signInEmail.trim().toLowerCase();
    if (!email || !email.includes('@')) return;
    setSignInStatus('loading');
    try {
      const res = await fetch(`${API_URL}/api/auth/request`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });
      const data = await res.json();
      if (data.success) {
        setSignInStatus('sent');
      } else {
        setSignInError(data.error || 'No account found for that email.');
        setSignInStatus('error');
      }
    } catch(e) {
      setSignInError('Something went wrong. Try again.');
      setSignInStatus('error');
    }
  }

  // Derive filled field count from fyFormation for progress bar
  const fyFilledCount = FY_FIELDS.filter(f => {
    const v = fyFormation[f];
    return v && (Array.isArray(v) ? v.length > 0 : v !== '');
  }).length;

  // Progress calculation
  const progressPct = (phase === 'home' || phase === 0) ? 0
    : phase === 'fy' ? Math.max(4, Math.round((fyFilledCount / 6) * 75))
    : phase === 'visual' ? 82
    : phase === 6 ? 90
    : 100;

  // Formation level based on phase / fy progress
  useEffect(() => {
    const target = (phase === 'home' || phase === 0) ? 0
      : phase === 'fy' ? Math.min(1 + fyFilledCount, 6)
      : phase === 'visual' ? 6
      : phase === 6 ? 6
      : 7;
    setFormationLevel(target);
  }, [phase, fyFilledCount]);

  // ── RESUME — load draft from localStorage on mount
  useEffect(() => {
    // If user already has a complete formation with studio name and session/email,
    // they've already been through the full flow — send them straight to dashboard
    try {
      const formation = localStorage.getItem('sy_formation');
      const session = localStorage.getItem('sy_session');
      const email = localStorage.getItem('sy_email');
      if (formation && (session || email)) {
        const f = JSON.parse(formation);
        // Save studio name to localStorage for dynamic reference
        if (f.studioName) {
          localStorage.setItem('sy_studio_name', f.studioName);
          window.location.href = 'dashboard.html';
          return;
        }
      }
    } catch(e) {}

    try {
      const raw = localStorage.getItem('sy_formation_draft');
      if (raw) {
        const draft = JSON.parse(raw);
        const hasChat = draft.apiMessages && draft.apiMessages.length > 1;
        const hasOldAnswers = Object.keys(draft.answers || {}).length > 0;
        if (hasChat || hasOldAnswers) {
          localStorage.setItem('sy_has_draft', 'true');
        }
      }
    } catch(e) {}
  }, []);

  // Pulse when good answer given
  const triggerPulse = useCallback(() => {
    setIsPulsing(true);
    setTimeout(() => setIsPulsing(false), 2000);
  }, []);

  // Focus input on question change
  useEffect(() => {
    setTimeout(() => {
      if (inputRef.current) inputRef.current.focus();
    }, 900);
    setCurrentVal('');
    setSelectedChips([]);
    setSelectedRange(null);
  }, [qIndex, phase]);

  // ── PHASE transitions
  const PHASE_ORDER = ['home', 0, 'fy', 'visual', 6, 7];

  function nextPhase() {
    const idx = PHASE_ORDER.indexOf(phase);
    if (idx < PHASE_ORDER.length - 1) {
      const next = PHASE_ORDER[idx + 1];
      transition(() => {
        setPhase(next);
        setQIndex(0);
        if (next === 6) buildLot();
        if (next === 7 && !fyText) startFYSpeech();
        if (next === 7 && fyText) { setFyTyping(false); setFyDone(true); }
      });
    }
  }

  function handleVisualComplete(visualData) {
    localStorage.setItem('sy_visual', JSON.stringify(visualData));
    transition(() => {
      setPhase(6);
      buildLot();
    });
  }

  // Called by FYFormationChat when it has enough context
  function handleFYFormationComplete(extractedFormation, fyFirstWords) {
    const newAnswers = {
      ...answers,
      p2_1: extractedFormation.contentTypes || [],
      p2_2: extractedFormation.platforms || [],
      p2_3: extractedFormation.experience || null,
      p3_1: extractedFormation.origin || null,
      p4_1: extractedFormation.goal1yr || null,
      p5_1: extractedFormation.biggestFear || null,
      creator_name: extractedFormation.creatorName || null,
      studio_name: extractedFormation.studioName || answers.studio_name || null,
    };
    const extractedFirstName = extractedFormation.firstName || extractedFormation.creatorName?.split(' ')[0] || null;
    setAnswers(newAnswers);
    setFyFormation({...extractedFormation, firstName: extractedFirstName});
    setFyText(fyFirstWords);
    setFyTyping(false);
    setFyDone(true);
    transition(() => {
      setPhase('visual');
    });
  }

  function transition(fn) {
    setScreenOut(true);
    setTimeout(() => {
      fn();
      setScreenOut(false);
    }, 400);
  }

  // ── ANSWER handling
  function saveAnswer(val) {
    if (val && String(val).length > 20) triggerPulse();
    setAnswers(prev => {
      const updated = { ...prev, [currentQ.id]: val };
      // Autosave every answer to localStorage
      try {
        localStorage.setItem('sy_formation_draft', JSON.stringify({
          answers: updated, phase, qIndex,
          savedAt: new Date().toISOString()
        }));
      } catch(e) {}
      // Show FY data card after 3rd answer if not yet dismissed
      if (!dataCardDismissed && Object.keys(updated).length === 3) {
        setTimeout(() => setShowDataCard(true), 600);
      }
      return updated;
    });
  }

  function advance() {
    const val = currentQ.type === 'multiselect' ? selectedChips :
                currentQ.type === 'range' ? selectedRange :
                currentVal;
    saveAnswer(val);

    // Claim studio name is now enforced server-side via Supabase unique constraint

    const phaseQs = QUESTIONS.filter(q => q.phase === phase);
    if (qIndex < phaseQs.length - 1) {
      transition(() => setQIndex(qIndex + 1));
    } else {
      nextPhase();
    }
  }

  function pass() {
    setPassToast(true);
    setTimeout(() => setPassToast(false), 2500);
    const phaseQs = QUESTIONS.filter(q => q.phase === phase);
    if (qIndex < phaseQs.length - 1) {
      transition(() => setQIndex(qIndex + 1));
    } else {
      nextPhase();
    }
  }

  function canContinue() {
    if (!currentQ) return false;
    if (currentQ.type === 'multiselect') return selectedChips.length > 0;
    if (currentQ.type === 'range') return selectedRange !== null;
    if (currentQ.type === 'studio_name') {
      // Can continue if available, or if empty/skipped (passable)
      return studioNameStatus === 'available' || currentVal.trim().length === 0;
    }
    if (currentQ.type === 'text') return true;
    return currentVal.trim().length > 0;
  }

  // ── LOT BUILD
  function buildLot(overrideAnswers) {
    const ans = overrideAnswers || answers;
    const platforms    = ans.p2_2 || [];
    const contentTypes = ans.p2_1 || [];
    const isFilm   = contentTypes.some(c => ['Film','Documentary','Animation'].includes(c));
    const isSocial = platforms.some(p => ['TikTok','Instagram'].includes(p));
    const isYT     = platforms.includes('YouTube');
    const isPod    = platforms.includes('Podcast platforms');

    let unlocked = ['ideate', 'develop', 'produce', 'distribute', 'monetize', 'clear'];
    if (isSocial || isYT || isPod) unlocked.push('brand', 'market');
    if (isYT || isSocial) unlocked.push('post');
    unlocked = [...new Set(unlocked)];

    setUnlockedBuildings(unlocked);

    BUILDINGS.forEach((b, i) => {
      setTimeout(() => {
        setRevealedBuildings(prev => [...prev, b.id]);
      }, 600 + i * 400);
    });

    setTimeout(() => setLotBuilt(true), 600 + BUILDINGS.length * 400 + 800);
  }

  // ── FY SPEECH — fallback only; primary path is FY formation chat completion
  async function startFYSpeech() {
    setFyTyping(true);
    startProcessing('Future You is reading your formation...');

    const f = {
      contentTypes: answers.p2_1 || [],
      platforms:    answers.p2_2 || [],
      experience:   answers.p2_3 || null,
      origin:       answers.p3_1 || null,
      goal1yr:      answers.p4_1 || null,
      biggestFear:  answers.p5_1 || null,
      studioName:   answers.studio_name || null,
    };

    try {
      const res = await fetch(`${API_URL}/api/formation/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: [{ role:'user', content:'I have shared everything. Give me your recognition.' }],
          formation: f,
        }),
      });
      const data = await res.json();
      const text = (data.success && data.message) || fallbackSpeech(f.studioName || 'your studio', f.contentTypes);
      typewriterEffect(text);
      stopProcessing();
    } catch(err) {
      typewriterEffect(fallbackSpeech(answers.studio_name || 'your studio', answers.p2_1 || []));
      stopProcessing();
    }
  }

  function fallbackSpeech(studioName, content) {
    const type = content?.[0] || 'creative work';
    return `You've been building something real for a while now — I can hear it in what you shared. The gap between where you are and where you're going isn't as wide as it feels from the inside. The first thing you need isn't more time or more tools. It's a clear record of what you've already built and a plan for what comes next. This is ${studioName !== 'your studio' ? studioName : 'your studio'}. Let's build it.`;
  }

  function typewriterEffect(text) {
    let i = 0;
    setFyText('');
    const interval = setInterval(() => {
      if (i < text.length) {
        setFyText(text.slice(0, i + 1));
        i++;
      } else {
        clearInterval(interval);
        setFyTyping(false);
        setFyDone(true);
      }
    }, 28);
  }

  // ── CHIP toggle
  function toggleChip(opt) {
    setSelectedChips(prev =>
      prev.includes(opt) ? prev.filter(c => c !== opt) : [...prev, opt]
    );
  }

  // ── KEYBOARD
  function handleKeyDown(e) {
    if (e.key === 'Enter' && !e.shiftKey && currentQ?.type !== 'textarea') {
      e.preventDefault();
      if (canContinue()) advance();
    }
  }

  // ── RENDER QUESTION INPUT
  function renderInput() {
    if (!currentQ) return null;
    switch (currentQ.type) {
      case 'studio_name':
        return (
          <StudioNameInput
            value={currentVal}
            onChange={val => { setCurrentVal(val); }}
            onStatusChange={s => setStudioNameStatus(s)}
          />
        );
      case 'text':
        return (
          <input
            ref={inputRef}
            className="q-input"
            value={currentVal}
            onChange={e => setCurrentVal(e.target.value)}
            onKeyDown={handleKeyDown}
            placeholder="Type here..."
            autoComplete="off"
          />
        );
      case 'textarea':
        return (
          <textarea
            ref={inputRef}
            className="q-textarea"
            value={currentVal}
            onChange={e => setCurrentVal(e.target.value)}
            placeholder="Take your time..."
            rows={4}
          />
        );
      case 'multiselect':
        return (
          <div className="q-chips">
            {currentQ.opts.map(opt => (
              <div key={opt}
                className={`chip ${selectedChips.includes(opt) ? 'active' : ''}`}
                onClick={() => toggleChip(opt)}
              >{opt}</div>
            ))}
          </div>
        );
      case 'range':
        return (
          <div className="q-range">
            {currentQ.opts.map(opt => (
              <div key={opt}
                className={`range-opt ${selectedRange === opt ? 'active' : ''}`}
                onClick={() => setSelectedRange(opt)}
              >{opt}</div>
            ))}
          </div>
        );
      default: return null;
    }
  }

  // ── SCREENS ──────────────────────────────────────────────────────────────

  const screenClass = (target) => {
    if (screenOut && phase === target) return 'screen out';
    if (phase !== target) return 'screen hidden';
    return 'screen';
  };

  return (
    <>
      {/* Ambient */}
      <div className="amb amb-1"/>
      <div className="amb amb-2"/>

      {/* Progress */}
      <div className="progress-track">
        <div className="progress-fill" style={{ width: `${progressPct}%` }}/>
      </div>

      {/* Topbar */}
      <div className="topbar">
        <div className="topbar-logo-wrap" onClick={e=>{ e.stopPropagation(); setShowLogoMenu(m=>!m); }}>
          <img src="assets/SY_LOGO_2D_OFFICIAL.png" alt="StudioYou"/>
          {showLogoMenu && (
            <div className="studio-menu" onClick={e=>e.stopPropagation()}>
              <div className="studio-menu-section">Get Started</div>
              <button className="studio-menu-item" onClick={()=>{
                setShowLogoMenu(false);
                try { localStorage.removeItem('sy_formation_draft'); } catch(e){}
                transition(() => setPhase(0));
              }}>
                ✦ Sign Up — Begin Formation
              </button>
              <button className="studio-menu-item" onClick={()=>{
                setShowLogoMenu(false);
                window.location.href='subscribe.html?src=direct';
              }}>
                ★ Subscribe Now
              </button>
              <div className="studio-menu-divider"/>
              <div className="studio-menu-section">Account</div>
              <button className="studio-menu-item" onClick={()=>{
                setShowLogoMenu(false);
                document.getElementById('lp-signin')?.scrollIntoView({behavior:'smooth'});
                transition(()=>setPhase('home'));
              }}>
                ↩ Return to Studio
              </button>
              <button className="studio-menu-item danger" onClick={()=>{
                setShowLogoMenu(false);
                try {
                  localStorage.removeItem('sy_session');
                  localStorage.removeItem('sy_email');
                  localStorage.removeItem('sy_formation');
                  localStorage.removeItem('sy_formation_draft');
                } catch(e){}
                transition(()=>setPhase('home'));
              }}>
                ✕ Sign Out
              </button>
            </div>
          )}
        </div>
        <div className="topbar-label">
          Build your studio now
        </div>
      </div>

      {/* FY Form — visible from FY chat phase onward */}
      {phase !== 0 && (
        <FYForm
          formationLevel={formationLevel}
          phaseId={phase}
          isPulsing={isPulsing}
        />
      )}

      {/* ── HOME: LANDING PAGE */}
      {phase === 'home' && (
        <div className={`screen lp-screen ${screenOut ? 'out' : ''}`}>
          <div className="lp-wrap">

            {/* Hero */}
            <div className="lp-eyebrow">StudioYou &nbsp;|&nbsp; Creator Platform</div>
            <h1 className="lp-headline">
              <span className="grad">Build your studio.</span><br/>
              Build yourself.
            </h1>
            <div className="lp-tagline">One price.&nbsp; All the top tools.&nbsp; Guided by the ultimate partner — you.</div>
            <p className="lp-body">
              StudioYou is the first creator platform built entirely around your journey —
              not the algorithm, not the brand deal, not someone else's path.
              Every tool, every decision, every next move — organized around you.
            </p>

            {/* CTAs */}
            <div className="lp-ctas">
              <button className="btn-begin" onClick={() => {
                localStorage.removeItem('sy_formation_draft');
                transition(() => setPhase(0));
              }}>
                Begin Formation
              </button>
              <button
                className="formation-q-btn"
                onClick={() => setShowFormationExplainer(true)}
                title="What is Formation?"
                style={{marginRight:'24px'}}
              >?</button>
              <button className="btn-pass" style={{fontSize:'12px', letterSpacing:'0.14em'}}
                onClick={() => document.getElementById('lp-signin').scrollIntoView({behavior:'smooth'})}
              >
                Already have a studio? Sign in →
              </button>
            </div>

            {/* Three pillars */}
            <div className="lp-pillars">
              <div className="lp-pillar">
                <div className="lp-pillar-icon">🏗️</div>
                <div className="lp-pillar-title">The Studio</div>
                <div className="lp-pillar-body">
                  Twelve open buildings covering every stage of the creative arc —
                  Ideate, Develop, Fund, Produce, Post, Distribute, Brand, Monetize, and more.
                  Your full production pipeline, open on day one.
                </div>
              </div>
              <div className="lp-pillar">
                <div className="lp-pillar-icon">💬</div>
                <div className="lp-pillar-title">Formation</div>
                <div className="lp-pillar-body">
                  A 20-minute conversation that builds your AI guide.
                  Not a profile. Not onboarding. The interview that tells FutureYou
                  who you are, where you've been, and where you're going.
                </div>
              </div>
              <div className="lp-pillar">
                <div className="lp-pillar-icon">⚡</div>
                <div className="lp-pillar-title">FutureYou</div>
                <div className="lp-pillar-body">
                  Not an AI assistant. Your career arc navigator — trained exclusively
                  on your journey. It already knows the road ahead,
                  because it's made entirely from you.
                </div>
              </div>
            </div>

            {/* Who it's for */}
            <div className="lp-who">
              <div className="lp-who-label">Built for</div>
              <div className="lp-who-tags">
                {['Filmmakers','YouTubers','Musicians','Podcasters','Writers',
                  'Photographers','Animators','Streamers','Creators'].map(t => (
                  <span key={t} className="lp-who-tag">{t}</span>
                ))}
              </div>
            </div>

            {/* FY quote */}
            <div className="lp-quote">
              <div className="lp-quote-text">
                "Other platforms deliver information. FutureYou delivers presence —
                the specific, personalized, timely presence of someone who knows your
                journey and knows what you need to hear right now. <em>StudioYou isn't for the Creator that wants to work for the big name studios; StudioYou is for the Creator that wants to BE them.</em>"
              </div>
              <div className="lp-quote-attr">FutureYou &nbsp;/&nbsp; StudioYou Platform</div>
            </div>

            {/* Sign in for returning users */}
            <div id="lp-signin" style={{display:'flex', alignItems:'center', gap:'28px', flexWrap:'wrap', marginBottom:'56px'}}>
              <div style={{flexShrink:0}}>
                <div className="lp-who-label" style={{marginBottom:'4px'}}>Already have a studio?</div>
                <div className="signin-note">We'll send a sign-in link to your email.</div>
              </div>
              {signInStatus === 'sent' ? (
                <div className="signin-sent">
                  Check your email — your studio link is on its way.
                </div>
              ) : (
                <div>
                  <div className="signin-row" style={{justifyContent:'flex-start'}}>
                    <input
                      className="signin-input"
                      type="email"
                      value={signInEmail}
                      onChange={e => { setSignInEmail(e.target.value); setSignInStatus('idle'); setSignInError(''); }}
                      onKeyDown={e => e.key === 'Enter' && handleSignIn()}
                      placeholder="your@email.com"
                      autoComplete="email"
                    />
                    <button
                      className="signin-btn"
                      onClick={handleSignIn}
                      disabled={signInStatus === 'loading' || !signInEmail.includes('@')}
                    >
                      {signInStatus === 'loading' ? <img src="assets/shutter1.gif" style={{width:28,height:28,objectFit:'contain',verticalAlign:'middle'}}/> : 'Return to Studio →'}
                    </button>
                  </div>
                  {signInStatus === 'error' && <div className="signin-error" style={{textAlign:'left'}}>{signInError}</div>}
                </div>
              )}
            </div>

          </div>
        </div>
      )}

      {/* ── PHASE 0: THE FRAME */}
      <div className={`screen ${phase === 0 ? (screenOut ? 'out' : '') : 'hidden'}`}>
        <div className="frame-wrap">
          <div className="frame-eyebrow">
            StudioYou &nbsp;/&nbsp; Formation
            <button
              className="formation-q-btn"
              onClick={() => setShowFormationExplainer(true)}
              title="What is Formation?"
              style={{marginLeft:'6px'}}
            >?</button>
          </div>
          <h1 className="frame-headline">
            <span className="grad">The first time</span><br/>
            YOU meet YOU.
          </h1>
          <p className="frame-body">
            What follows isn't a profile setup. It isn't onboarding.<br/>
            You're about to build something that already knows where you're going —<br/>
            because it's made entirely from you.
          </p>
          <p className="frame-body" style={{fontSize:'14px', opacity:0.6, marginBottom:'40px'}}>
            Set aside 20–30 minutes. Answer as honestly as you can.<br/>
            Pass anything you're not ready for. No answer is wrong.
          </p>
          {/* New user CTA */}
          <div style={{display:'flex', alignItems:'center', justifyContent:'center', gap:'0'}}>
            <button className="btn-begin" onClick={() => {
              localStorage.removeItem('sy_formation_draft');
              transition(() => setPhase('fy'));
            }}>
              Begin Formation
            </button>
            <button
              className="formation-q-btn"
              onClick={() => setShowFormationExplainer(true)}
              title="What is Formation?"
            >?</button>
          </div>

          {/* Resume banner — shown if FY chat draft exists */}
          {typeof window !== 'undefined' && (() => {
            try {
              const raw = localStorage.getItem('sy_formation_draft');
              if (!raw) return null;
              const draft = JSON.parse(raw);
              const hasChat = draft.apiMessages && draft.apiMessages.length > 1;
              if (!hasChat) return null;
              const filledFields = FY_FIELDS.filter(f => {
                const v = (draft.formation || {})[f];
                return v && (Array.isArray(v) ? v.length > 0 : v !== '');
              }).length;
              if (filledFields < 1) return null;
              return (
                <div className="resume-banner">
                  <div className="resume-text">
                    You started a formation conversation with FutureYou — {filledFields} of 6 context points captured. Pick up where you left off.
                  </div>
                  <button className="resume-btn" onClick={() => {
                    transition(() => setPhase('fy'));
                  }}>Resume</button>
                  <button className="resume-fresh" onClick={() => {
                    localStorage.removeItem('sy_formation_draft');
                    transition(() => setPhase('fy'));
                  }}>Start fresh</button>
                </div>
              );
            } catch(e) { return null; }
          })()}
        </div>
      </div>

      {/* ── FY FORMATION CHAT */}
      {phase === 'fy' && (
        <div className={`screen ${screenOut ? 'out' : ''}`}>
          <FYFormationChat
            onComplete={handleFYFormationComplete}
            onFormationChange={newF => { setFyFormation(newF); }}
          />
        </div>
      )}

      {/* ── PHASE VISUAL: STUDIO PORTRAIT */}
      {phase === 'visual' && (
        <div className={`screen ${screenOut ? 'out' : ''}`}>
          <VisualIdentityPhase
            answers={answers}
            onComplete={handleVisualComplete}
          />
        </div>
      )}

      {/* ── PHASE 6: THE LOT */}
      {phase === 6 && (
        <div className={`screen ${screenOut ? 'out' : ''}`} style={{overflowY:'auto', justifyContent:'flex-start', paddingTop:'100px', paddingBottom:'60px'}}>
          <div className="lot-wrap">
            <div className="lot-header">
              <div className="lot-name">
                {answers.studio_name || 'Your Studio'}
              </div>
              <div className={`lot-sub lot-sub-pulse`} style={{color:'#4cff91'}}>
                {revealedBuildings.length < BUILDINGS.length ? 'Opening your lot...' : 'Formation complete'}
              </div>
            </div>

            <div className="buildings-grid">
              {BUILDINGS.map(b => {
                const isRevealed = revealedBuildings.includes(b.id);
                const isUnlocked = unlockedBuildings.includes(b.id);
                return (
                  <div key={b.id}
                    className={`building ${isRevealed ? 'revealed' : ''} ${isUnlocked ? 'unlocked' : 'locked'}`}
                  >
                    <div className="b-icon">{b.icon}</div>
                    <div className="b-name">{b.name}</div>
                    <div className="b-status">{isUnlocked ? 'Open' : 'Phase 2'}</div>
                    {!isUnlocked && <div className="b-status" style={{color:'rgba(240,242,255,0.2)'}}>Unlocks later</div>}
                  </div>
                );
              })}
            </div>

            {lotBuilt && (
              <div style={{textAlign:'center', marginTop:'16px'}}>
                <div style={{
                  fontFamily:"'Playfair Display', serif",
                  fontStyle:'italic',
                  fontSize:'16px',
                  color:'var(--dim)',
                  marginBottom:'20px',
                }}>Your studio is ready. Time to enter.</div>
                <button className="btn-continue" onClick={nextPhase}
                  style={{fontSize:'16px', padding:'16px 48px'}}>
                  Enter Your Studio
                </button>
              </div>
            )}
          </div>
        </div>
      )}

      {/* ── PHASE 7: FY SPEAKS (+ email capture) */}
      {phase === 7 && (
        <div className={`screen ${screenOut ? 'out' : ''}`}>
          <ReactorReveal answers={answers}/>
          <div className="fy-speak-wrap" style={{position:'relative',zIndex:3}}>
            <div className="fy-speak-label">FutureYou</div>
            <div className="fy-speak-text">
              {fyText}
              {fyTyping && <span className="cursor"/>}
            </div>
            {fyDone && (
              <EnterStudio answers={answers} fyText={fyText}/>
            )}
          </div>
        </div>
      )}

      {/* Phase label footer */}
      <div className={`phase-label ${phase === 0 || phase === 'visual' || phase === 6 || phase === 7 ? 'hidden' : ''}`}>
        {phase === 'fy' && fyFilledCount > 0 && `${fyFilledCount} of 6 — your studio is taking shape`}
      </div>

      {/* FY Data Card — appears after 3rd answer */}
      {showDataCard && !dataCardDismissed && (
        <FYDataCard
          onDismiss={() => { setShowDataCard(false); setDataCardDismissed(true); }}
          onSaved={(email) => { setShowDataCard(false); setDataCardDismissed(true); }}
        />
      )}

      {/* Formation explainer modal */}
      {showFormationExplainer && (
        <FormationExplainer onClose={() => setShowFormationExplainer(false)}/>
      )}

      {/* Pass toast */}
      <div className={`pass-toast ${passToast ? '' : 'hidden'}`}>
        Noted. You can always come back to this.
      </div>
    </>
  );
}

// ── REACTOR HELPERS ──────────────────────────────────────────────────────────

function studioSeed(name) {
  if (!name) return 42;
  let h = 5381;
  for (let i = 0; i < name.length; i++) {
    h = ((h << 5) + h) ^ name.charCodeAt(i);
    h = h >>> 0;
  }
  return h || 1;
}

function buildCinematicPrompts(answers) {
  const contentTypes = answers.p2_1 || [];
  const platforms    = answers.p2_2 || [];
  const studioName   = answers.studio_name || 'Studio';
  const isFilm   = contentTypes.some(c => ['Film','Documentary','Animation'].includes(c));
  const isSocial = platforms.some(p => ['TikTok','Instagram'].includes(p));
  const isYT     = platforms.includes('YouTube');
  const isPod    = platforms.includes('Podcast platforms');
  const type = isFilm ? 'film' : isSocial && !isYT ? 'social' : isYT ? 'youtube' : isPod ? 'podcast' : 'multi';

  const scenes = {
    film: [
      `A cinematic production lot at golden hour — camera cranes silhouetted against a warm amber sky, a director's chair facing a vast LED volume wall displaying sweeping landscapes. Documentary cameras on fluid heads, cables running across polished concrete floors, monitors glowing in the shadows. Anamorphic wide shot, warm tungsten and natural light mixing, subtle lens flare, fine film grain. The feeling of a serious working creative operation.`,
      `Inside a documentary archive studio — a creator moves through rows of film canisters, projected archival footage washing over white walls in layered light. A curved editing bay with multiple monitors displaying timelines. The hum of storytelling in progress, deliberate and precise. Warm amber tones, shallow depth of field, cinematic.`,
      `Exterior of ${studioName} at dusk — the studio name in architectural lettering above a glass entrance, golden light spilling from inside, silhouettes of creators moving purposefully through lit corridors. Wide shot, depth of field pulling to the sign, cinematic fade, a feeling of arrival and permanence.`
    ],
    social: [
      `A sleek modern creator loft — LED ring lights casting warm highlights on a clean white backdrop, multiple screens displaying vertical video analytics and content calendars. A cinema camera on a motorized slider, softboxes and LED panels arranged for production. Wide contemporary shot, warm controlled tones, organized and purposeful.`,
      `A creator mid-production — geometric backdrops, dynamic lighting rigs cycling through warm colors, a camera on a fluid head capturing from a dynamic angle. Screens display scrolling audience engagement, growth charts, trending content. Energetic, vibrant, moving forward. Medium shot, social-native aesthetic.`,
      `${studioName} studio exterior at twilight — a converted loft with large windows, soft neon signage glowing, production cases lined up near the entrance. Light from multiple active shooting bays spills out. Wide establishing shot, cinematic dusk, the scale of a working creator operation.`
    ],
    youtube: [
      `A polished content studio set — dramatic backlit shelving with curated objects arranged with editorial precision, acoustic panels on charcoal walls, a cinema camera on a fluid head tripod. Soft golden hour light from high clerestory windows, a well-appointed production desk with dual monitors. Wide shot, editorial depth of field, warm cinematic grade.`,
      `A content edit bay in session — large monitors displaying timeline sequences, a filmmaker reviewing footage in progress. Reference books and notes cover a producer's desk. The feeling of intentional, considered work. Warm tungsten tones, quiet concentration, cinematic.`,
      `${studioName} — a studio identity materializing. The name displayed on a broadcast monitor in a darkened room, a single spotlight on a cinema camera and director's chair. Wide shot, high contrast, still and anticipatory, the deliberate beginning of something significant.`
    ],
    podcast: [
      `A broadcast-quality podcast studio — geometric acoustic foam panels in precise patterns on matte walls, a round conversation table with high-end condenser microphones and closed-back headphones. Moody amber and cool blue lighting, a glowing mixing board in the foreground. Multiple widescreen monitors displaying waveforms. Wide shot, intimate and professional.`,
      `Inside the recording booth — a host in deep conversation, animated and focused, warm window light from the control room glass. Soundproofing everywhere, a sense of contained creative intensity. The controlled environment where ideas become permanent record. Medium shot, warm tones, cinematic.`,
      `${studioName} audio studio — the name on a plaque beside the studio door, an ON AIR light illuminated above the window. Through the double glass, a show in progress. The culture of long-form conversation, deliberately built. Wide establishing shot, cinematic atmosphere.`
    ],
    multi: [
      `A multi-purpose creator complex — a photography cyclorama wall curving from floor to ceiling, cinema cameras on cranes, a podcast corner with professional microphone arms, a writing desk flooded with natural north-facing light. High ceilings, exposed beams, a space designed for every format of creative output. Wide architectural shot, soft overcast light, warm accent lighting.`,
      `The studio in simultaneous motion — a camera operator framing a shot on one side, a designer at a large reference monitor on another, an audio engineer adjusting levels in a corner. The organized momentum of a full-service creative operation. Overhead wide angle, dynamic, purposeful.`,
      `${studioName} — the full studio complex at dusk, multiple production spaces, warm amber light glowing from windows, the scale of what has been built becoming visible from the outside. Drone-style wide establishing shot, cinematic golden hour, architectural permanence.`
    ],
  };
  return scenes[type] || scenes.multi;
}

// ── REACTOR REVEAL — Phase 7 cinematic background ─────────────────────────────

function ReactorReveal({ answers }) {
  const videoRef   = React.useRef(null);
  const reactorRef = React.useRef(null);
  const [streaming, setStreaming] = React.useState(false);
  const [sdkReady, setSdkReady]   = React.useState(!!window.ReactorSDKClass);

  React.useEffect(() => {
    if (sdkReady) return;
    const handler = () => setSdkReady(true);
    window.addEventListener('reactor-sdk-ready', handler);
    return () => window.removeEventListener('reactor-sdk-ready', handler);
  }, [sdkReady]);

  React.useEffect(() => {
    if (!sdkReady) return;
    let cancelled = false;
    async function init() {
      try {
        const res = await fetch(`${API_URL}/api/reactor/token`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
        });
        if (!res.ok || cancelled) return;
        const { jwt } = await res.json();
        if (!jwt || cancelled) return;

        const reactor = new window.ReactorSDKClass({ modelName: 'helios' });
        reactorRef.current = reactor;

        reactor.on('trackReceived', (name, track, stream) => {
          if (videoRef.current) {
            videoRef.current.srcObject = stream;
            videoRef.current.play().catch(() => {});
          }
          if (!cancelled) setStreaming(true);
        });

        await reactor.connect(jwt);
        await reactor.sendCommand('set_seed', { seed: studioSeed(answers.studio_name) });

        const prompts = buildCinematicPrompts(answers);
        await reactor.sendCommand('schedule_prompt', { prompt: prompts[0], chunk: 0 });
        await reactor.sendCommand('schedule_prompt', { prompt: prompts[1], chunk: 5 });
        await reactor.sendCommand('schedule_prompt', { prompt: prompts[2], chunk: 10 });
        await reactor.sendCommand('start', {});
      } catch(e) {
        console.warn('[ReactorReveal] init failed:', e);
      }
    }
    init();
    return () => {
      cancelled = true;
      if (reactorRef.current) reactorRef.current.sendCommand('pause', {}).catch(() => {});
    };
  }, [sdkReady]);

  return (
    <>
      <video
        ref={videoRef}
        muted playsInline
        style={{
          position:'fixed', inset:0, width:'100%', height:'100%',
          objectFit:'cover', zIndex:1,
          opacity: streaming ? 1 : 0,
          transition: 'opacity 2s ease',
        }}
      />
      <div style={{
        position:'fixed', inset:0, zIndex:2, pointerEvents:'none',
        background: 'linear-gradient(135deg, rgba(6,9,26,0.75) 0%, rgba(6,9,26,0.55) 100%)',
        opacity: streaming ? 1 : 0,
        transition: 'opacity 2s ease',
      }}/>
    </>
  );
}
