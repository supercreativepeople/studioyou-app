<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudioYou Dashboard</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
        }
        .dashboard {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        .sidebar {
            width: 280px;
            background: #1a1a1a;
            border-right: 1px solid #333;
            padding: 20px;
            overflow-y: auto;
        }
        .sidebar-section {
            margin-bottom: 24px;
        }
        .sidebar-label {
            font-size: 11px;
            text-transform: uppercase;
            color: #888;
            letter-spacing: 1px;
            margin-bottom: 10px;
            font-weight: 600;
        }
        .sidebar-item {
            padding: 10px 12px;
            margin-bottom: 6px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            border-left: 2px solid transparent;
        }
        .sidebar-item:hover {
            background: #2a2a2a;
        }
        .sidebar-item.active {
            background: #2a2a2a;
            color: #64c8ff;
            border-left-color: #64c8ff;
        }
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .topbar {
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }
        .topbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .topbar-title {
            font-size: 14px;
            font-weight: 600;
            color: #e0e0e0;
        }
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge-universal {
            background: rgba(100, 200, 255, 0.15);
            color: #64c8ff;
        }
        .badge-pro {
            background: rgba(200, 100, 255, 0.15);
            color: #c864ff;
        }
        .topbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 24px;
            overflow-y: auto;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }
        .message.user {
            justify-content: flex-end;
        }
        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.5;
            font-size: 14px;
        }
        .message.assistant .message-content {
            background: #2a2a2a;
            color: #e0e0e0;
        }
        .message.user .message-content {
            background: #0066cc;
            color: white;
        }
        .input-area {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }
        .input-field {
            flex: 1;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 12px 16px;
            color: #e0e0e0;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            max-height: 120px;
        }
        .input-field:focus {
            outline: none;
            border-color: #64c8ff;
            background: #333;
        }
        .send-btn {
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .send-btn:hover {
            background: #0052a3;
        }
        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .stage-badge {
            background: rgba(100, 200, 100, 0.15);
            color: #64c864;
        }
        .settings-btn {
            background: #2a2a2a;
            border: 1px solid #444;
            color: #e0e0e0;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .settings-btn:hover {
            background: #333;
            border-color: #666;
        }
        .empty-state {
            text-align: center;
            color: #888;
            padding: 40px 20px;
        }
        .empty-state-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #b0b0b0;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const API_URL = 'https://studioyou-api-198959034459.us-east1.run.app';

        function Dashboard() {
            const API_URL = 'https://studioyou-api-198959034459.us-east1.run.app';
            const [messages, setMessages] = React.useState([]);
            const [input, setInput] = React.useState('');
            const [loading, setLoading] = React.useState(false);
            const [tier, setTier] = React.useState('universal');
            const [email, setEmail] = React.useState('');
            const [formation, setFormation] = React.useState(null);
            const [journeyStage, setJourneyStage] = React.useState('ideate');
            const messagesEndRef = React.useRef(null);

            // Initialize from localStorage
            React.useEffect(() => {
                const storedEmail = localStorage.getItem('email');
                const storedTier = localStorage.getItem('tier') || 'universal';
                const storedStage = localStorage.getItem('journeyStage') || 'ideate';
                
                // Backward compatibility: rename tiers
                let normalizedTier = storedTier;
                if (storedTier === 'independent') normalizedTier = 'universal';
                if (storedTier === 'operator') normalizedTier = 'pro';
                
                setEmail(storedEmail || '');
                setTier(normalizedTier);
                setJourneyStage(storedStage);
                localStorage.setItem('tier', normalizedTier); // Update storage
            }, []);

            // Auto-scroll to latest message
            React.useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);

            const sendMessage = async () => {
                if (!input.trim() || loading) return;

                const userMessage = { role: 'user', content: input };
                setMessages(prev => [...prev, userMessage]);
                setInput('');
                setLoading(true);

                try {
                    // Build system prompt with tier mode
                    let systemPrompt = `You are FutureYou, the career arc navigator for StudioYou.`;
                    
                    if (tier === 'universal') {
                        systemPrompt += ` Operating in DIRECTIVE MODE: The creator tells you what they want. You handle routing to tools, platforms, communities. Tools are invisible. You make the decisions.`;
                    } else {
                        systemPrompt += ` Operating in PEER ADVISOR MODE: The creator directs. You advise with 2-3 curated options and reasoning. Full toolkit visible. Let them choose.`;
                    }

                    const response = await fetch(`${API_URL}/api/formation/chat`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            email: email || 'guest',
                            messages: [...messages, userMessage],
                            tier: tier,
                            systemPrompt: systemPrompt
                        })
                    });

                    if (!response.ok) throw new Error('Chat request failed');
                    
                    const data = await response.json();
                    setMessages(prev => [...prev, { role: 'assistant', content: data.content }]);
                } catch (error) {
                    console.error('Chat error:', error);
                    const errorMsg = error.message || 'Connection error';
                    setMessages(prev => [...prev, {
                        role: 'assistant',
                        content: `Can't reach FutureYou. Error: ${errorMsg}. Check console for details.`
                    }]);
                } finally {
                    setLoading(false);
                }
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            };

            const handleTierChange = (newTier) => {
                setTier(newTier);
                localStorage.setItem('tier', newTier);
            };

            const handleStageChange = (stage) => {
                setJourneyStage(stage);
                localStorage.setItem('journeyStage', stage);
            };

            const isUniversal = tier === 'universal';

            return (
                <div className="dashboard">
                    {/* Sidebar */}
                    <div className="sidebar">
                        <div className="sidebar-section">
                            <div className="sidebar-label">Journey Stages</div>
                            {['ideate', 'develop', 'produce', 'distribute', 'monetize'].map(stage => (
                                <div
                                    key={stage}
                                    className={`sidebar-item ${journeyStage === stage ? 'active' : ''}`}
                                    onClick={() => handleStageChange(stage)}
                                >
                                    {stage.charAt(0).toUpperCase() + stage.slice(1)}
                                </div>
                            ))}
                        </div>

                        <div className="sidebar-section">
                            <div className="sidebar-label">Creator Tier</div>
                            <div
                                className={`sidebar-item ${isUniversal ? 'active' : ''}`}
                                onClick={() => handleTierChange('universal')}
                            >
                                🎯 Universal
                            </div>
                            <div
                                className={`sidebar-item ${!isUniversal ? 'active' : ''}`}
                                onClick={() => handleTierChange('pro')}
                            >
                                ⚙️ Pro
                            </div>
                        </div>

                        <div className="sidebar-section">
                            <div className="sidebar-label">Account</div>
                            <input
                                type="email"
                                placeholder="your@email.com"
                                value={email}
                                onChange={(e) => {
                                    setEmail(e.target.value);
                                    localStorage.setItem('email', e.target.value);
                                }}
                                style={{
                                    width: '100%',
                                    padding: '8px 12px',
                                    background: '#2a2a2a',
                                    border: '1px solid #444',
                                    borderRadius: '6px',
                                    color: '#e0e0e0',
                                    fontSize: '13px'
                                }}
                            />
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="main-content">
                        {/* Topbar */}
                        <div className="topbar">
                            <div className="topbar-left">
                                <div className="topbar-title">FutureYou</div>
                                <span className={`badge stage-badge`}>
                                    {journeyStage.toUpperCase()}
                                </span>
                                <span className={`badge ${isUniversal ? 'badge-universal' : 'badge-pro'}`}>
                                    {isUniversal ? 'Universal' : 'Pro'}
                                </span>
                            </div>
                            <div className="topbar-right">
                                <button className="settings-btn">⚙️ Settings</button>
                            </div>
                        </div>

                        {/* Chat Area */}
                        <div className="chat-container">
                            <div className="messages">
                                {messages.length === 0 ? (
                                    <div className="empty-state">
                                        <div className="empty-state-title">Welcome to FutureYou</div>
                                        <p>Tell me what you want to make next, and I'll guide you.</p>
                                    </div>
                                ) : (
                                    messages.map((msg, idx) => (
                                        <div key={idx} className={`message ${msg.role}`}>
                                            <div className="message-content">
                                                {msg.content}
                                            </div>
                                        </div>
                                    ))
                                )}
                                <div ref={messagesEndRef} />
                            </div>

                            {/* Input Area */}
                            <div className="input-area">
                                <textarea
                                    className="input-field"
                                    placeholder="What do you want to create?"
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    onKeyDown={handleKeyDown}
                                    disabled={loading}
                                    rows="3"
                                />
                                <button
                                    className="send-btn"
                                    onClick={sendMessage}
                                    disabled={loading || !input.trim()}
                                >
                                    {loading ? '...' : 'Send'}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Define API endpoint
        const API_URL = 'https://studioyou-api-198959034459.us-east1.run.app';
        
        ReactDOM.render(<Dashboard />, document.getElementById('root'));
    </script>
    <script>
        // Debug logging for API connectivity
        console.log('StudioYou Dashboard loaded');
        console.log('API_URL:', 'https://studioyou-api-198959034459.us-east1.run.app');
        
        // Test API health on load
        fetch('https://studioyou-api-198959034459.us-east1.run.app/api/health')
            .then(r => r.json())
            .then(d => console.log('API Health:', d))
            .catch(e => console.error('API Health Check Failed:', e.message));
    </script>
</body>
</html>
